<!DOCTYPE html>
<html lang="zh-TW">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>霓虹矩陣：邊緣行者 | Neon Matrix: Cyber-Runner</title>
 <style>
 /* === 基礎重置與全域樣式 === */
 * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
 background-color: #05050c;
 color: #f0f4f8;
 font-family: 'Courier New', monospace;
 min-height: 100vh;
 display: flex;
 justify-content: center;
 align-items: flex-start;
 padding: 20px;
 }

 /* === 標題區域 === */
 .header {
 width: 100%;
 max-width: 1200px;
 text-align: center;
 margin-bottom: 20px;
 }

 .title {
 font-size: 2.5rem;
 color: #ff007f;
 text-shadow: 0 0 20px rgba(255, 0, 127, 0.5), 0 0 40px rgba(0, 255, 255, 0.3);
 letter-spacing: 4px;
 margin-bottom: 10px;
 animation: glitch 2s infinite;
 }

 @keyframes glitch {
 0%, 100% { transform: translateX(0); }
 25% { transform: translateX(-2px); }
 75% { transform: translateX(2px); }
 }

 .subtitle {
 font-size: 0.9rem;
 color: #00ffff;
 letter-spacing: 2px;
 }

 /* === 音樂控制面板 === */
 .audio-controls {
 display: flex;
 justify-content: center;
 align-items: center;
 gap: 15px;
 margin: 15px 0;
 }

 .btn-audio {
 background: rgba(0, 255, 255, 0.1);
 border: 1px solid #00ffff;
 color: #00ffff;
 padding: 8px 16px;
 border-radius: 4px;
 cursor: pointer;
 font-family: inherit;
 transition: all 0.3s;
 }

 .btn-audio:hover {
 background: rgba(0, 255, 255, 0.3);
 box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
 }

 .volume-control {
 display: flex;
 align-items: center;
 gap: 5px;
 }

 .volume-control input {
 width: 80px;
 accent-color: #ff007f;
 }

 /* === 主遊戲容器 === */
 .game-container {
 width: 100%;
 max-width: 1200px;
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 20px;
 }

 @media (max-width: 768px) {
 .game-container {
 grid-template-columns: 1fr;
 }
 }

 /* === 遊戲地圖區域 === */
 .map-panel {
 background: rgba(26, 32, 48, 0.8);
 border: 1px solid #3a4767;
 border-radius: 12px;
 padding: 20px;
 }

 .map-title {
 color: #00ffff;
 margin-bottom: 15px;
 font-size: 1.2rem;
 }

 .game-map {
 display: grid;
 grid-template-columns: repeat(10, 1fr);
 gap: 2px;
 margin-bottom: 15px;
 }

 .map-cell {
 width: 40px;
 height: 40px;
 background: #1a1f32;
 border: 1px solid #252f44;
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 1.2rem;
 cursor: pointer;
 transition: all 0.3s;
 }

 .map-cell:hover {
 background: #2a3452;
 box-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
 }

 .map-cell.player {
 background: #00ffff;
 color: #000;
 box-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
 }

 .map-cell.database {
 background: #3a4767;
 }

 .map-cell.clinic {
 background: #2a3452;
 }

 .map-cell.boss {
 background: #ff007f;
 color: #fff;
 animation: pulse 1s infinite;
 }

 @keyframes pulse {
 0%, 100% { opacity: 1; }
 50% { opacity: 0.7; }
 }

 /* === 虛擬方向鍵 === */
 .d-pad {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 5px;
 max-width: 150px;
 margin: 0 auto;
 }

 .d-pad-btn {
 width: 40px;
 height: 40px;
 background: #1a1f32;
 border: 1px solid #3a4767;
 color: #00ffff;
 display: flex;
 align-items: center;
 justify-content: center;
 cursor: pointer;
 font-size: 1.2rem;
 transition: all 0.3s;
 }

 .d-pad-btn:hover {
 background: #2a3452;
 box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
 }

 /* === 右側面板 === */
 .right-panel {
 display: flex;
 flex-direction: column;
 gap: 20px;
 }

 /* === 狀態監控 === */
 .status-panel {
 background: rgba(26, 32, 48, 0.8);
 border: 1px solid #3a4767;
 border-radius: 12px;
 padding: 20px;
 }

 .status-title {
 color: #00ffff;
 margin-bottom: 15px;
 font-size: 1.2rem;
 }

 .stat-row {
 display: flex;
 justify-content: space-between;
 align-items: center;
 margin: 10px 0;
 }

 .stat-label {
 color: #8fa0c0;
 }

 .stat-value {
 color: #00ffff;
 font-weight: bold;
 }

 .stat-value.gold {
 color: #39ff14;
 }

 .hp-bar-container {
 width: 100%;
 height: 20px;
 background: #111622;
 border-radius: 10px;
 overflow: hidden;
 margin: 10px 0;
 }

 .hp-bar {
 height: 100%;
 background: linear-gradient(90deg, #ff007f, #00ffff);
 transition: width 0.3s ease;
 border-radius: 10px;
 }

 /* === 網路日誌 === */
 .net-log {
 background: #0d111a;
 border: 1px solid #252f44;
 border-radius: 8px;
 padding: 15px;
 height: 300px;
 overflow-y: auto;
 font-size: 0.85rem;
 line-height: 1.5;
 }

 .net-log::-webkit-scrollbar {
 width: 8px;
 }

 .net-log::-webkit-scrollbar-track {
 background: #0d111a;
 }

 .net-log::-webkit-scrollbar-thumb {
 background: #3a4767;
 border-radius: 4px;
 }

 .log-entry {
 margin-bottom: 8px;
 padding: 5px;
 border-bottom: 1px solid rgba(255, 255, 255, 0.1);
 animation: fadeIn 0.3s ease;
 }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(5px); }
 to { opacity: 1; transform: translateY(0); }
 }

 .log-player { color: #00ffff; }
 .log-damage { color: #ff007f; }
 .log-success { color: #39ff14; }
 .log-system { color: #8fa0c0; }
 .log-warning { color: #ffd43b; }

 /* === 結算覆蓋畫面 === */
 .overlay {
 display: none;
 position: fixed;
 top: 0; left: 0; width: 100%; height: 100%;
 background: rgba(5, 5, 12, 0.95);
 justify-content: center;
 align-items: center;
 flex-direction: column;
 z-index: 100;
 padding: 20px;
 text-align: center;
 }

 .overlay.active {
 display: flex;
 }

 .overlay-content {
 background: rgba(26, 32, 48, 0.9);
 border: 2px solid #ff007f;
 border-radius: 12px;
 padding: 40px;
 max-width: 500px;
 animation: glitchIn 0.5s ease;
 }

 @keyframes glitchIn {
 from { transform: scale(0.8); opacity: 0; }
 to { transform: scale(1); opacity: 1; }
 }

 .overlay-title {
 font-size: 2rem;
 margin-bottom: 20px;
 color: #ff007f;
 text-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
 }

 .overlay-text {
 font-size: 1rem;
 margin-bottom: 30px;
 color: #f0f4f8;
 line-height: 1.6;
 }

 .btn-reboot {
 background: linear-gradient(135deg, #ff007f, #00ffff);
 color: #000;
 border: none;
 padding: 12px 30px;
 border-radius: 6px;
 font-size: 1rem;
 font-weight: bold;
 cursor: pointer;
 font-family: inherit;
 transition: all 0.3s;
 }

 .btn-reboot:hover {
 box-shadow: 0 0 20px rgba(255, 0, 127, 0.7);
 transform: translateY(-2px);
 }

 /* === 資訊面板 === */
 .info-panel {
 background: rgba(26, 32, 48, 0.8);
 border: 1px solid #3a4767;
 border-radius: 12px;
 padding: 15px;
 font-size: 0.8rem;
 color: #8fa0c0;
 }

 .info-panel h4 {
 color: #00ffff;
 margin-bottom: 10px;
 }

 .info-panel ul {
 margin-left: 15px;
 }

 .info-panel li {
 margin: 3px 0;
 }
 </style>
</head>
<body>

 <!-- 標題與音樂控制 -->
 <div class="header">
 <div class="title">霓虹矩陣：邊緣行者</div>
 <div class="subtitle">NEON MATRIX: CYBER-RUNNER</div>

 <!-- 音樂控制面板 -->
 <div class="audio-controls">
 <button class="btn-audio" id="btn-music" onclick="toggleMusic()">🔇 播放音樂</button>
 <div class="volume-control">
 <span>🔊</span>
 <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.4" oninput="setVolume(this.value)">
 <span>🔈</span>
 </div>
 </div>
 </div>

 <!-- 主遊戲容器 -->
 <div class="game-container">
 <!-- 左側：地圖 -->
 <div class="map-panel">
 <div class="map-title">🌐 賽博網格地圖</div>
 <div class="game-map" id="game-map"></div>
 <div class="d-pad">
 <div></div>
 <button class="d-pad-btn" onclick="movePlayer(0, -1)">⬆️</button>
 <div></div>
 <button class="d-pad-btn" onclick="movePlayer(-1, 0)">⬅️</button>
 <button class="d-pad-btn" onclick="movePlayer(0, 0)">⏹️</button>
 <button class="d-pad-btn" onclick="movePlayer(1, 0)">➡️</button>
 <div></div>
 <button class="d-pad-btn" onclick="movePlayer(0, 1)">⬇️</button>
 <div></div>
 </div>
 </div>

 <!-- 右側：狀態與日誌 -->
 <div class="right-panel">
 <!-- 狀態監控 -->
 <div class="status-panel">
 <div class="status-title">💻 神經同步監控</div>
 <div class="stat-row">
 <span class="stat-label">🧠 神經同步率 (HP)</span>
 <span class="stat-value" id="hp-text">100/100</span>
 </div>
 <div class="hp-bar-container">
 <div class="hp-bar" id="hp-bar"></div>
 </div>
 <div class="stat-row">
 <span class="stat-label">💻 核心入侵權限 (ATK)</span>
 <span class="stat-value" id="atk-text">15</span>
 </div>
 <div class="stat-row">
 <span class="stat-label">🪙 隱密歐元 (Eddies)</span>
 <span class="stat-value gold" id="gold-text">0</span>
 </div>
 </div>

 <!-- 網路日誌 -->
 <div class="net-log" id="net-log">
 <div class="log-entry log-system">[系統啟動] 連線至賽博空間...請選擇行動方案</div>
 </div>

 <!-- 資訊面板 -->
 <div class="info-panel">
 <h4>📋 操作指南</h4>
 <ul>
 <li>🗺️ 地圖節點：💽 數據庫 | 💉 診所 | 👑 荒坂</li>
 <li>⬆️⬇️⬅️➡️ 移動 | ⏹️ 停留</li>
 <li>💾 數據庫：獲得 Eddies，但可能遭受防火牆反擊</li>
 <li>💉 診所：消耗 15 Eddies 恢復全部生命</li>
 <li>👑 荒坂：最終 Boss 戰觸發</li>
 </ul>
 </div>
 </div>
 </div>

 <!-- 結局覆蓋畫面 -->
 <div class="overlay" id="end-overlay">
 <div class="overlay-content">
 <div class="overlay-title" id="overlay-title">結局</div>
 <div class="overlay-text" id="overlay-text"></div>
 <button class="btn-reboot" id="btn-reboot" onclick="resetGame()">🔄 重新啟動矩陣</button>
 </div>
 </div>

 <!-- 背景音樂 - 使用 Web Audio API 生成 -->
 <audio id="bg-music" loop preload="none"></audio>

 <script>
 // === 遊戲狀態 ===
 let player = {
 x: 0,
 y: 0,
 hp: 100,
 maxHp: 100,
 atk: 15,
 gold: 0,
 hpPrivilege: 0
 };

 let boss = {
 hp: 500,
 maxHp: 500,
 atk: 25
 };

 let isGameOver = false;
 let isMusicPlaying = false;
 const bgMusic = document.getElementById('bg-music');
 const btnMusic = document.getElementById('btn-music');

 // === 地圖節點類型 ===
 const nodeTypes = {
 empty: { emoji: '⬛', name: '數據流' },
 database: { emoji: '💽', name: '企業數據庫' },
 clinic: { emoji: '💉', name: '神經浪人診所' },
 boss: { emoji: '👑', name: '荒坂企業' },
 player: { emoji: '⚡', name: '邊緣行者' }
 };

 // === 初始化地圖 ===
 function initMap() {
 const mapElement = document.getElementById('game-map');
 mapElement.innerHTML = '';

 for (let y = 0; y < 10; y++) {
 for (let x = 0; x < 10; x++) {
 const cell = document.createElement('div');
 cell.className = 'map-cell';
 cell.id = `cell-${x}-${y}`;

 // 設定節點類型
 if (x === 0 && y === 0) {
 cell.classList.add('player');
 cell.textContent = nodeTypes.player.emoji;
 } else if (x === 9 && y === 9) {
 cell.classList.add('boss');
 cell.textContent = nodeTypes.boss.emoji;
 } else if (x === 5 && y === 5) {
 cell.classList.add('database');
 cell.textContent = nodeTypes.database.emoji;
 } else if (x === 3 && y === 7) {
 cell.classList.add('clinic');
 cell.textContent = nodeTypes.clinic.emoji;
 } else {
 cell.textContent = nodeTypes.empty.emoji;
 }

 cell.onclick = () => moveToCell(x, y);
 mapElement.appendChild(cell);
 }
 }
 }

 // === 更新 UI ===
 function updateUI() {
 document.getElementById('hp-text').innerText = player.hp + '/' + player.maxHp;
 document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';
 document.getElementById('atk-text').innerText = player.atk;
 document.getElementById('gold-text').innerText = player.gold;

 // 更新地圖
 document.querySelectorAll('.map-cell').forEach(cell => {
 cell.classList.remove('player');
 cell.textContent = nodeTypes.empty.emoji;
 });

 const playerCell = document.getElementById(`cell-${player.x}-${player.y}`);
 if (playerCell) {
 playerCell.classList.add('player');
 playerCell.textContent = nodeTypes.player.emoji;
 }

 // 更新 Boss 狀態
 if (boss.hp <= 0) {
 document.getElementById('boss-hp-text').innerText = '已被瓦解';
 }
 }

 // === 移動玩家 ===
 function movePlayer(dx, dy) {
 if (isGameOver) return;

 const newX = player.x + dx;
 const newY = player.y + dy;

 // 檢查邊界
 if (newX < 0 || newX >= 10 || newY < 0 || newY >= 10) {
 addLog('⚠️ 邊界防護：無法越界', 'log-warning');
 return;
 }

 // 檢查是否為相同位置（停留按鈕）
 if (dx === 0 && dy === 0) {
 addLog('⏹️ 保持位置，觀察周圍環境...', 'log-system');
 return;
 }

 player.x = newX;
 player.y = newY;

 // 處理節點互動
 handleNodeInteraction();
 updateUI();
 }

 function moveToCell(x, y) {
 if (isGameOver) return;

 const dx = x - player.x;
 const dy = y - player.y;

 // 只能移動相鄰格子
 if (Math.abs(dx) + Math.abs(dy) === 1) {
 movePlayer(dx, dy);
 } else {
 addLog('⚠️ 只能移動相鄰格子', 'log-warning');
 }
 }

 // === 處理節點互動 ===
 function handleNodeInteraction() {
 const cellId = `cell-${player.x}-${player.y}`;
 const cellElement = document.getElementById(cellId);

 if (cellElement.classList.contains('database')) {
 addLog('💾 發現企業數據庫！', 'log-player');
 // 攻擊防火牆
 boss.hp -= player.atk;
 addLog(`⚔️ 核心入侵成功！造成 ${player.atk} 點傷害`, 'log-success');

 // 可能遭受防火牆反擊
 if (Math.random() > 0.5) {
 player.hp -= 10;
 addLog('🛡️ 防火牆反擊！遭受 10 點傷害', 'log-damage');
 }

 // 獲得 Eddies
 const eddies = Math.floor(Math.random() * 11) + 10;
 player.gold += eddies;
 player.hpPrivilege += 2;
 addLog(`💰 獲取 ${eddies} Eddies，入侵權限 +2`, 'log-success');

 // 播放音效
 playSFX('hack');

 if (player.hp <= 0) {
 gameOver(false);
 } else if (boss.hp <= 0) {
 gameOver(true);
 }
 } else if (cellElement.classList.contains('clinic')) {
 addLog('💉 發現神經浪人診所', 'log-player');
 if (player.gold >= 15) {
 player.gold -= 15;
 player.hp = player.maxHp;
 addLog('💊 完全修復！生命恢復至最大值', 'log-success');
 playSFX('heal');
 } else {
 addLog('⚠️ Eddies 不足！需要 15 Eddies', 'log-warning');
 }
 } else if (cellElement.classList.contains('boss')) {
 addLog('👑 觸發荒坂企業最終戰！', 'log-damage');
 startBossFight();
 }
 }

 // === 最終 Boss 戰 ===
 function startBossFight() {
 let turn = 0;
 addLog('🔥 啟動自動化駭客模擬...', 'log-system');

 const hackLoop = setInterval(() => {
 if (isGameOver || turn >= 10) {
 clearInterval(hackLoop);
 return;
 }

 // 玩家攻擊
 boss.hp -= player.atk;
 addLog(`⚔️ 駭客攻擊 #${turn + 1}：造成 ${player.atk} 點傷害`, 'log-success');

 if (boss.hp <= 0) {
 boss.hp = 0;
 clearInterval(hackLoop);
 gameOver(true);
 return;
 }

 // Boss 反擊
 player.hp -= boss.atk;
 addLog(`🛡️ 防火牆反擊：遭受 ${boss.atk} 點傷害`, 'log-damage');

 if (player.hp <= 0) {
 player.hp = 0;
 clearInterval(hackLoop);
 gameOver(false);
 return;
 }

 turn++;
 updateUI();
 }, 500);
 }

 // === 遊戲結束 ===
 function gameOver(isWin) {
 isGameOver = true;
 const overlay = document.getElementById('end-overlay');
 const title = document.getElementById('overlay-title');
 const text = document.getElementById('overlay-text');

 if (isWin) {
 title.innerText = '🌟 矩陣重構：企業崩塌';
 text.innerHTML = '荒坂企業的數位城堡已被瓦解。<br>你在霓虹都市中贏得了自由。<br><br>最終數據：權限 ' + player.hpPrivilege + ' | Eddies ' + player.gold;
 title.style.color = '#00ffff';
 } else {
 title.innerText = '☠️ 大腦燒毀：連線中斷';
 text.innerHTML = '你的神經同步率歸零...<br>阿茲拉爾的防火牆吞噬了最後的數據。<br><br>最終數據：權限 ' + player.hpPrivilege + ' | Eddies ' + player.gold;
 title.style.color = '#ff007f';
 }

 overlay.classList.add('active');
 }

 // === 重置遊戲 ===
 function resetGame() {
 player = {
 x: 0,
 y: 0,
 hp: 100,
 maxHp: 100,
 atk: 15,
 gold: 0,
 hpPrivilege: 0
 };

 boss = {
 hp: 500,
 maxHp: 500,
 atk: 25
 };

 isGameOver = false;
 document.getElementById('end-overlay').classList.remove('active');
 document.getElementById('net-log').innerHTML = '<div class="log-entry log-system">[系統重啟] 連線至賽博空間...請選擇行動方案</div>';
 initMap();
 updateUI();
 }

 // === 日誌系統 ===
 function addLog(message, className) {
 const logElement = document.getElementById('net-log');
 const entry = document.createElement('div');
 entry.className = 'log-entry ' + className;
 entry.innerText = message;
 logElement.appendChild(entry);
 logElement.scrollTop = logElement.scrollHeight;
 }

 // === 賽博朋克 8-Bit 音樂生成器 ===
 let audioCtx = null;
 let cyberInterval = null;
 let cyberGain = null;

 // 賽博朋克風格音階（小調 + 半音）
 const CYBER_SCALE = {
 bass: [65.41, 65.41, 77.78, 77.78, 87.31, 87.31, 73.42, 73.42],  // C2, D2, E2, Db2
 arp: [
 [261.63, 311.13, 392.00],  // Cm
 [220.00, 261.63, 311.13],  // Dm
 [196.00, 233.08, 293.66],  // Eb
 [220.00, 261.63, 311.13],  // Dm
 [261.63, 311.13, 392.00],  // Cm
 [246.94, 293.66, 349.23],  // Eb
 [196.00, 233.08, 293.66],  // Db
 [220.00, 261.63, 311.13]   // Dm
 ],
 lead: [
 [440, 523.25, 622.25], [392, 466.16, 587.33], [349.23, 415.30, 523.25],
 [392, 466.16, 587.33], [440, 523.25, 622.25], [415.30, 493.88, 587.33],
 [349.23, 415.30, 523.25], [392, 466.16, 587.33]
 ],
 bassLead: [
 [130.81, 155.56, 196.00], [110.00, 130.81, 155.56], [98.00, 116.54, 146.83],
 [110.00, 130.81, 155.56], [130.81, 155.56, 196.00], [123.47, 146.83, 174.61],
 [98.00, 116.54, 146.83], [110.00, 130.81, 155.56]
 ]
 };

 function playCyberNote(freq, type, startTime, duration, volume, ctx) {
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.type = type;
 osc.frequency.value = freq;
 gain.gain.setValueAtTime(0, startTime);
 gain.gain.linearRampToValueAtTime(volume, startTime + 0.005);
 gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.9);
 osc.connect(gain).connect(cyberGain);
 osc.start(startTime);
 osc.stop(startTime + duration);
 }

 function playCyberBGM() {
 if (!isMusicPlaying) return;
 if (!audioCtx) {
 audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 cyberGain = audioCtx.createGain();
 cyberGain.gain.value = 0.12;
 cyberGain.connect(audioCtx.destination);
 }
 const now = audioCtx.currentTime;
 const loopDur = 16; // 16秒循環
 const step = loopDur / 64; // 64拍
 const chordIdx = Math.floor((now % loopDur) / (loopDur / 8)) % 8;

 // === Bass（方波低沉脈動）===
 for (let i = 0; i < 8; i++) {
 const t = now + i * (loopDur / 8);
 const freq = CYBER_SCALE.bass[i];
 playCyberNote(freq, 'square', t, (loopDur/8) * 0.9, 0.08, audioCtx);
 // Sub bass
 playCyberNote(freq / 2, 'sine', t, (loopDur/8) * 0.8, 0.06, audioCtx);
 }

 // === Arpeggio（琶音快速分解和弦）===
 for (let i = 0; i < 32; i++) {
 const t = now + i * step * 2;
 if (t > now + loopDur) break;
 const arp = CYBER_SCALE.arp[chordIdx];
 const arpIdx = i % 3;
 playCyberNote(arp[arpIdx], 'square', t, step * 1.8, 0.03, audioCtx);
 }

 // === Lead melody（高頻旋律線條）===
 for (let bar = 0; bar < 2; bar++) {
 const barOff = bar * (loopDur / 2);
 for (let i = 0; i < 4; i++) {
 const t = now + barOff + i * (loopDur / 8);
 const notes = CYBER_SCALE.lead[chordIdx];
 // 主旋律 - 使用三角波
 playCyberNote(notes[2], 'triangle', t, (loopDur/8) * 0.7, 0.05, audioCtx);
 // 裝飾音
 if (i < 3) {
 playCyberNote(notes[1] * 1.5, 'square', t + (loopDur/16), (loopDur/16), 0.015, audioCtx);
 }
 }
 }

 // === Rhythm（電子節拍）===
 for (let i = 0; i < 16; i++) {
 const t = now + i * (loopDur / 16);
 if (i % 4 === 0) {
 // 低音鼓
 playCyberNote(50, 'sine', t, 0.1, 0.12, audioCtx);
 }
 if (i % 8 === 4) {
 // 軍鼓
 const bufSize = audioCtx.sampleRate * 0.08;
 const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
 const data = buf.getChannelData(0);
 for (let s = 0; s < bufSize; s++) data[s] = (Math.random() * 2 - 1);
 const src = audioCtx.createBufferSource();
 src.buffer = buf;
 const g = audioCtx.createGain();
 g.gain.setValueAtTime(0.06, t);
 g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
 src.connect(g).connect(cyberGain);
 src.start(t);
 }
 // Hi-hat
 playCyberNote(8000 + Math.random() * 4000, 'square', t + (loopDur/32), 0.02, 0.015, audioCtx);
 }

 // === 氛圍效果（低頻LFO掃描）===
 const lfoFreq = 0.15 + Math.sin(now * 0.1) * 0.05;
 for (let i = 0; i < 8; i++) {
 const t = now + i * (loopDur / 8);
 const osc = audioCtx.createOscillator();
 const g = audioCtx.createGain();
 const filter = audioCtx.createBiquadFilter();
 filter.type = 'lowpass';
 filter.frequency.value = 400 + Math.sin(i * 0.8) * 300;
 filter.Q.value = 5;
 osc.type = 'sine';
 osc.frequency.value = CYBER_SCALE.bass[i] * 0.5;
 g.gain.setValueAtTime(0, t);
 g.gain.linearRampToValueAtTime(0.02, t + 1);
 g.gain.setValueAtTime(0.02, t + loopDur/8 - 2);
 g.gain.linearRampToValueAtTime(0, t + loopDur/8);
 osc.connect(filter).connect(g).connect(cyberGain);
 osc.start(t);
 osc.stop(t + loopDur/8);
 }

 cyberInterval = setTimeout(playCyberBGM, loopDur * 1000);
 }

 // === 音樂控制 ===
 function toggleMusic() {
 if (isMusicPlaying) {
 isMusicPlaying = false;
 if (cyberInterval) clearTimeout(cyberInterval);
 if (audioCtx) {
 audioCtx.close().catch(() => {});
 audioCtx = null;
 }
 btnMusic.innerText = '🔇 播放音樂';
 addLog('🔇 音樂已關閉', 'log-system');
 } else {
 isMusicPlaying = true;
 playCyberBGM();
 btnMusic.innerText = '🔊 靜音';
 addLog('🎵 賽博朋克 BGM 啟動中...', 'log-player');
 }
 }

 function setVolume(value) {
 // Web Audio API gain control
 if (cyberGain) cyberGain.gain.value = parseFloat(value) * 0.12;
 }

 // === 音效系統 (Web Audio API) ===
 function playSFX(type) {
 try {
 const audioContext = new (window.AudioContext || window.webkitAudioContext)();
 const oscillator = audioContext.createOscillator();
 const gainNode = audioContext.createGain();

 oscillator.connect(gainNode);
 gainNode.connect(audioContext.destination);

 switch(type) {
 case 'hack':
 oscillator.frequency.value = 800;
 oscillator.type = 'square';
 gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
 gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
 oscillator.start(audioContext.currentTime);
 oscillator.stop(audioContext.currentTime + 0.1);
 break;

 case 'heal':
 oscillator.frequency.value = 400;
 oscillator.type = 'sine';
 gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
 gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
 oscillator.start(audioContext.currentTime);
 oscillator.stop(audioContext.currentTime + 0.2);
 break;

 case 'damage':
 oscillator.frequency.value = 200;
 oscillator.type = 'sawtooth';
 gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
 gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
 oscillator.start(audioContext.currentTime);
 oscillator.stop(audioContext.currentTime + 0.3);
 break;

 case 'victory':
 oscillator.frequency.value = 600;
 oscillator.type = 'square';
 gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
 gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
 oscillator.start(audioContext.currentTime);
 oscillator.stop(audioContext.currentTime + 0.5);
 break;

 case 'defeat':
 oscillator.frequency.value = 150;
 oscillator.type = 'sawtooth';
 gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
 gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
 oscillator.start(audioContext.currentTime);
 oscillator.stop(audioContext.currentTime + 0.4);
 break;
 }
 } catch (e) {
 // 如果 Web Audio API 不可用，忽略音效錯誤
 }
 }

 // === 鍵盤控制 ===
 document.addEventListener('keydown', (e) => {
 if (isGameOver) return;

 switch(e.key) {
 case 'ArrowUp':
 case 'w':
 case 'W':
 movePlayer(0, -1);
 break;
 case 'ArrowDown':
 case 's':
 case 'S':
 movePlayer(0, 1);
 break;
 case 'ArrowLeft':
 case 'a':
 case 'A':
 movePlayer(-1, 0);
 break;
 case 'ArrowRight':
 case 'd':
 case 'D':
 movePlayer(1, 0);
 break;
 case ' ':
 movePlayer(0, 0);
 break;
 }
 });

 // === 初始化遊戲 ===
 function initGame() {
 initMap();
 updateUI();

 // 設定音樂音量
 bgMusic.volume = 0.4;

 // 嘗試自動播放音樂
 document.addEventListener('click', function autoPlayOnce() {
 if (!isMusicPlaying) {
 bgMusic.volume = 0.4;
 }
 document.removeEventListener('click', autoPlayOnce);
 }, { once: false });

 addLog('🌆 歡迎進入賽博空間，邊緣行者', 'log-player');
 addLog('💡 提示：使用鍵盤方向鍵或 W/S/A/D 移動', 'log-system');
 }

 // 啟動遊戲
 initGame();
 </script>
