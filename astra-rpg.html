<!DOCTYPE html>
<html lang="zh-TW">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>星輝交織的終焉 - Astra: The Last Horizon</title>
 <style>
 /* === 基礎現代深色風格 === */
 *, *::before, *::after {
 box-sizing: border-box;
 }

 body {
 background-color: #121620;
 color: #f0f4f8;
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
 margin: 0;
 padding: 20px;
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 }

 .game-container {
 width: 100%;
 max-width: 650px;
 background: rgba(26, 32, 48, 0.95);
 border: 1px solid #3a4767;
 border-radius: 16px;
 padding: 25px;
 box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
 }

 h1 {
 text-align: center;
 color: #e2b842;
 font-size: 1.8rem;
 margin-top: 0;
 letter-spacing: 2px;
 text-shadow: 0 0 10px rgba(226, 184, 66, 0.3);
 }

 .subtitle {
 text-align: center;
 color: #8fa0c0;
 font-size: 0.9rem;
 margin-top: -10px;
 margin-bottom: 25px;
 }

 /* === 角色與魔王狀態區 === */
 .status-section {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 20px;
 margin-bottom: 25px;
 }

 @media (max-width: 500px) {
 .status-section {
 grid-template-columns: 1fr;
 }
 }

 .status-box {
 background: #222b3e;
 border-radius: 10px;
 padding: 15px;
 border-left: 4px solid #4a90e2;
 }

 .status-box.boss {
 border-left: 4px solid #e056fd;
 }

 .character-title {
 font-weight: bold;
 font-size: 1.1rem;
 margin-bottom: 10px;
 color: #a5d8ff;
 }

 .boss .character-title {
 color: #f783ac;
 }

 /* === 血條樣式 === */
 .hp-bar-container {
 background: #111622;
 border-radius: 6px;
 height: 12px;
 width: 100%;
 margin-top: 5px;
 overflow: hidden;
 }

 .hp-bar {
 background: linear-gradient(90deg, #22b8cf, #4dadf7);
 height: 100%;
 width: 100%;
 transition: width 0.3s ease;
 }

 .boss .hp-bar {
 background: linear-gradient(90deg, #da77f2, #e599f7);
 }

 .stat-line {
 font-size: 0.9rem;
 margin: 6px 0;
 color: #cddee9;
 }

 /* === 日誌文本區 === */
 .log-container {
 background: #0d111a;
 border: 1px solid #252f44;
 border-radius: 8px;
 height: 180px;
 overflow-y: auto;
 padding: 15px;
 margin-bottom: 25px;
 font-size: 0.9rem;
 line-height: 1.6;
 scroll-behavior: smooth;
 }

 .log-entry {
 margin-bottom: 8px;
 border-bottom: 1px dashed #1c2333;
 padding-bottom: 4px;
 animation: fadeIn 0.3s ease;
 }

 /* === 按鈕動作區 === */
 .action-container {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 12px;
 }

 .btn {
 background: #2c384e;
 color: #fff;
 border: 1px solid #415273;
 padding: 12px;
 font-size: 0.95rem;
 border-radius: 8px;
 cursor: pointer;
 transition: all 0.2s ease;
 font-family: inherit;
 }

 .btn:hover:not(:disabled) {
 background: #3b4b69;
 border-color: #5c729e;
 transform: translateY(-1px);
 }

 .btn:active:not(:disabled) {
 transform: translateY(1px);
 }

 .btn:disabled {
 opacity: 0.4;
 cursor: not-allowed;
 transform: none !important;
 }

 .btn-prime {
 grid-column: span 2;
 background: linear-gradient(135deg, #6741d9, #7048e8);
 border: none;
 font-weight: bold;
 font-size: 1.05rem;
 letter-spacing: 1px;
 }

 .btn-prime:hover:not(:disabled) {
 background: linear-gradient(135deg, #7048e8, #7e5cef);
 box-shadow: 0 0 15px rgba(112, 72, 232, 0.4);
 }

 /* === 結算覆蓋畫面 === */
 .overlay {
 display: none;
 position: fixed;
 top: 0; left: 0; width: 100%; height: 100%;
 background: rgba(10, 13, 20, 0.95);
 justify-content: center;
 align-items: center;
 flex-direction: column;
 z-index: 10;
 padding: 20px;
 text-align: center;
 }

 .overlay-title {
 font-size: 2rem;
 margin-bottom: 25px;
 font-weight: bold;
 line-height: 1.5;
 white-space: pre-line;
 }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(5px); }
 to { opacity: 1; transform: translateY(0); }
 }

 /* === 音樂控制按鈕 === */
 .music-control {
 position: fixed;
 bottom: 20px;
 right: 20px;
 width: 48px;
 height: 48px;
 border-radius: 50%;
 background: rgba(13,17,26,0.85);
 border: 1px solid rgba(226,184,66,0.3);
 color: #e2b842;
 font-size: 1.3rem;
 cursor: pointer;
 z-index: 50;
 display: flex;
 align-items: center;
 justify-content: center;
 transition: all 0.3s;
 backdrop-filter: blur(8px);
 }
 .music-control:hover {
 box-shadow: 0 0 20px rgba(226,184,66,0.4);
 transform: scale(1.1);
 }
 .music-control.playing {
 animation: pulse-glow 2s ease-in-out infinite;
 }
 @keyframes pulse-glow {
 0%, 100% { box-shadow: 0 0 10px rgba(226,184,66,0.2); }
 50% { box-shadow: 0 0 25px rgba(226,184,66,0.5); }
 }
 </style>
</head>
<body>

 <div class="game-container">
 <h1>星輝交織的終焉</h1>
 <div class="subtitle">Astra: The Last Horizon</div>

 <div class="status-section">
 <div class="status-box">
 <div class="character-title">逐光之刃 (玩家)</div>
 <div class="stat-line">星輝生命: <span id="hero-hp-text">100 / 100</span></div>
 <div class="hp-bar-container">
 <div id="hero-hp-bar" class="hp-bar"></div>
 </div>
 <div class="stat-line" style="margin-top: 12px;">星能星魄值 (ATK): <span id="hero-atk">15</span></div>
 <div class="stat-line">星塵碎屑 (金幣): <span id="hero-gold" style="color: #ffd43b;">0</span></div>
 </div>

 <div class="status-box boss">
 <div class="character-title">虛空帝王・阿茲拉爾</div>
 <div class="stat-line">虛空核心: <span id="boss-hp-text">500 / 500</span></div>
 <div class="hp-bar-container">
 <div id="boss-hp-bar" class="hp-bar"></div>
 </div>
 <div class="stat-line" style="margin-top: 12px; color: #8fa0c0;">威脅等級: <span id="boss-danger-text" style="color: #ff8787; font-weight: bold;">終焉級 (ATK: 25)</span></div>
 </div>
 </div>

 <div class="log-container" id="log-box">
 <div class="log-entry" style="color: #8fa0c0;">[序章] 世界沒入永夜，唯有你手中的光芒能切開虛空。請聚集星能，直面阿茲拉爾。</div>
 </div>

 <div class="action-container">
 <button class="btn" id="btn-train">感知星辰律動<br><small style="color: #ffa8a8;">(生命-10 | 星魄+2 | 獲取星塵)</small></button>
 <button class="btn" id="btn-rest">飲用聖樹泉水<br><small style="color: #ffd43b;">(消耗 15 星塵 | 補滿生命)</small></button>
 <button class="btn btn-prime" id="btn-boss">✨ 直面虛空帝王 ✨<br><small style="color: #e599f7;">(發動星輝共鳴，但將遭受虛空反噬)</small></button>
 </div>
 </div>

 <div class="overlay" id="end-overlay">
 <div class="overlay-title" id="overlay-text">結局</div>
 <button class="btn" id="btn-reset" style="padding: 15px 40px; font-size: 1.1rem;">重啟星迴迴圈</button>
 </div>

 <button class="music-control" id="musicBtn" onclick="toggleMusic()" title="背景音樂">🔇</button>

 <script>
 // === 1. 初始化遊戲數據與狀態鎖 ===
 let hero = { hp: 100, maxHp: 100, atk: 15, gold: 0 };
 let boss = { hp: 500, maxHp: 500, atk: 25, baseAtk: 25 };
 let turnCount = 0;
 let isGameOver = false;

 // 獲取 DOM 元素
 const logBox = document.getElementById('log-box');
 const btnTrain = document.getElementById('btn-train');
 const btnRest = document.getElementById('btn-rest');
 const btnBoss = document.getElementById('btn-boss');
 const btnReset = document.getElementById('btn-reset');
 const endOverlay = document.getElementById('end-overlay');
 const overlayText = document.getElementById('overlay-text');
 const bgMusic = document.getElementById('bgMusic');
 const musicBtn = document.getElementById('musicBtn');
 let isMusicPlaying = false;

 // === 2. 綁定事件監聽器 ===
 btnTrain.addEventListener('click', actionTrain);
 btnRest.addEventListener('click', actionRest);
 btnBoss.addEventListener('click', actionChallenge);
 btnReset.addEventListener('click', resetGame);

 // === 3. 更新畫面顯示的函式 ===
 function updateUI() {
 // 更新勇者
 document.getElementById('hero-hp-text').innerText = hero.hp + " / " + hero.maxHp;
 const heroHpPercent = Math.max(0, (hero.hp / hero.maxHp) * 100);
 document.getElementById('hero-hp-bar').style.width = heroHpPercent + "%";
 document.getElementById('hero-atk').innerText = hero.atk;
 document.getElementById('hero-gold').innerText = hero.gold;

 // 更新魔王
 document.getElementById('boss-hp-text').innerText = boss.hp + " / " + boss.maxHp;
 const bossHpPercent = Math.max(0, (boss.hp / boss.maxHp) * 100);
 document.getElementById('boss-hp-bar').style.width = bossHpPercent + "%";
 document.getElementById('boss-danger-text').innerText = "終焉級 (ATK: " + boss.atk + ")";

 // 綜合動態按鈕啟用狀態
 if (isGameOver) {
 btnTrain.disabled = true;
 btnRest.disabled = true;
 btnBoss.disabled = true;
 } else {
 btnTrain.disabled = hero.hp <= 10;
 btnBoss.disabled = false;
 btnRest.disabled = hero.gold < 15;
 }
 }

 // === 4. 輸出日誌函式 ===
 function addLog(message, color) {
 if (color === undefined) color = '#f0f4f8';
 const entry = document.createElement('div');
 entry.className = 'log-entry';
 entry.style.color = color;
 entry.innerHTML = message;
 logBox.appendChild(entry);
 logBox.scrollTo({
 top: logBox.scrollHeight,
 behavior: 'smooth'
 });
 }

 // === 5. 核心時間軸機制 ===
 function advanceTurn() {
 turnCount++;
 if (turnCount % 3 === 0) {
 boss.atk += 3;
 addLog("⚠️ 隨著時間流逝，虛空侵蝕加劇！阿茲拉爾的虛空反噬傷害提升至 <b>" + boss.atk + " 點！</b>", "#e056fd");
 }
 }

 // === 6. 動作：感知星辰律動 ===
 function actionTrain() {
 if (isGameOver) return;
 if (hero.hp <= 10) {
 addLog("⚠️ 你的星輝生命過於微弱，無法承受星辰律動的衝擊！先去飲用泉水吧。", "#ff8787");
 return;
 }
 hero.hp -= 10;
 hero.atk += 2;
 let earnedGold = Math.floor(Math.random() * 11) + 10;
 hero.gold += earnedGold;
 addLog("🌌 你閉上雙眼感應到宇宙深處的脈動。<b>星魄值提升 2 點</b>。你在星塵中提煉出了 <b>" + earnedGold + " 點</b> 星塵碎屑。但靈魂受到了 10 點反噬。", "#a5d8ff");
 advanceTurn();
 updateUI();
 }

 // === 7. 動作：飲用聖樹泉水 ===
 function actionRest() {
 if (isGameOver) return;
 if (hero.gold < 15) return;
 hero.gold -= 15;
 hero.hp = hero.maxHp;
 addLog("🧪 你飲下了散發微光的聖樹泉水，乾涸的靈魂重新被星輝充滿。<b>生命值完全恢復！</b>", "#63e6be");
 advanceTurn();
 updateUI();
 }

 // === 8. 動作：直面虛空帝王 ===
 function actionChallenge() {
 if (isGameOver) return;
 boss.hp -= hero.atk;
 addLog("⚔️ 你高舉逐光之刃，揮出匯聚星能的一擊！對【阿茲拉爾】造成了 <b>" + hero.atk + " 點</b> 神聖傷害！", "#ffd43b");

 if (boss.hp <= 0) {
 boss.hp = 0;
 updateUI();
 showEndScreen(true);
 return;
 }

 hero.hp -= boss.atk;
 addLog("💥 阿茲拉爾發出低沉的咆哮，虛空觸手撕裂空間，對你造成了 <b>" + boss.atk + " 點</b> 虛空傷害。", "#ff8787");

 if (hero.hp <= 0) {
 hero.hp = 0;
 updateUI();
 showEndScreen(false);
 return;
 }

 updateUI();
 }

 // === 9. 勝負結算控制 ===
 function showEndScreen(isWin) {
 isGameOver = true;
 updateUI();
 endOverlay.style.display = 'flex';
 if (isWin) {
 overlayText.innerText = "✨ 黎明破曉 ✨\n\n虛空帝王化為塵埃，星海重獲秩序。\n你打破了永恆的宿命，成為了永恆的傳說。";
 overlayText.style.color = "#ffd43b";
 } else {
 overlayText.innerText = "☠️ 沒入永夜 ☠️\n\n你的星光熄滅了...\n阿茲拉爾的虛空吞噬了最後的地平線，星迴再度重啟。";
 overlayText.style.color = "#ff8787";
 }
 }

 // === 10. 重新開始 ===
 function resetGame() {
 hero = { hp: 100, maxHp: 100, atk: 15, gold: 0 };
 boss = { hp: 500, maxHp: 500, atk: 25, baseAtk: 25 };
 turnCount = 0;
 isGameOver = false;
 logBox.innerHTML = '<div class="log-entry" style="color: #8fa0c0;">[新星迴] 時間軸倒流。你再次握緊了逐光之刃，這次命運會如何？</div>';
 endOverlay.style.display = 'none';
 updateUI();
 }

 // === 11. 背景音樂控制 ===
 function toggleMusic() {
 if (isMusicPlaying) {
 bgMusic.pause();
 musicBtn.textContent = '🔇';
 musicBtn.classList.remove('playing');
 } else {
 bgMusic.play().then(function() {
 addLog("🎵 背景音樂已開啟", "#e2b842");
 }).catch(function(e) {
 addLog("🔇 點擊遊戲畫面後再試試音樂按鈕", "#8fa0c0");
 });
 musicBtn.textContent = '🔊';
 musicBtn.classList.add('playing');
 }
 isMusicPlaying = !isMusicPlaying;
 }

 // 設定音樂音量
