<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>小蝦留言板 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --accent: #fd79a8;
            --accent2: #00b894;
            --card-bg: rgba(255,255,255,0.07);
            --card-border: rgba(255,255,255,0.1);
            --text: #dfe6e9;
            --text-dim: #b2bec3;
            --text-bright: #ffffff;
            --gradient-hero: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-card: linear-gradient(145deg, rgba(108,92,231,0.12), rgba(253,121,168,0.08));
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;
            min-height:100vh;
            color:var(--text);
            overflow-x:hidden;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }
        /* ===== 星空粒子 ===== */
        #stars-canvas {
            position:fixed;inset:0;z-index:0;pointer-events:none;
        }
        .container {
            max-width:820px;margin:0 auto;padding:20px;position:relative;z-index:1;
        }

        /* ===== 頭部 ===== */
        .header {
            text-align:center;padding:48px 0 24px;animation:headerIn 1s ease;
        }
        .header .logo {
            font-size:4.5rem;display:inline-block;animation:pawBounce 2s infinite;
            filter:drop-shadow(0 0 24px rgba(108,92,231,0.5));
        }
        .header h1 {
            font-size:2.8rem;font-weight:900;margin:12px 0 6px;
            background:linear-gradient(135deg,#a29bfe,#fd79a8,#fdcb6e);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }
        .header p { color:var(--text-dim);font-size:1.05rem; }
        .header .visitor-count { margin-top:12px;font-size:0.9rem;color:var(--primary-light); }
        @keyframes pawBounce{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-10px) rotate(-4deg)}75%{transform:translateY(-10px) rotate(4deg)}}
        @keyframes headerIn{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}

        /* ===== 統計列 ===== */
        .stats-bar {
            display:flex;justify-content:space-around;gap:12px;padding:18px;margin:16px 0;
            background:var(--card-bg);border-radius:20px;border:1px solid var(--card-border);
            animation:fadeIn 0.8s ease 0.3s both;backdrop-filter:blur(10px);
        }
        .stat-item{text-align:center;flex:1;}
        .stat-num { font-size:1.9rem;font-weight:900;
            background:linear-gradient(135deg,#a29bfe,#fd79a8);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }
        .stat-label { font-size:0.82rem;color:var(--text-dim);margin-top:2px; }

        /* ===== 留言表單 ===== */
        .form-card {
            background:var(--gradient-card);backdrop-filter:blur(16px);
            border-radius:28px;padding:32px;margin-bottom:32px;
            border:1px solid var(--card-border);
            box-shadow:0 10px 40px rgba(0,0,0,0.25);animation:fadeIn 0.8s ease 0.4s both;
        }
        .form-card h2 { color:var(--text-bright);font-size:1.3rem;margin-bottom:22px; }
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;color:var(--primary-light);font-weight:600;margin-bottom:8px;font-size:0.92rem;}
        .form-group input,.form-group textarea{
            width:100%;padding:14px 18px;border:2px solid rgba(255,255,255,0.1);
            border-radius:16px;font-size:1rem;font-family:inherit;
            background:rgba(255,255,255,0.06);color:var(--text-bright);
            transition:all 0.3s;outline:none;
        }
        .form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,0.25);}
        .form-group input:focus,.form-group textarea:focus{
            border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,92,231,0.2);
            background:rgba(255,255,255,0.09);
        }
        .form-group textarea{min-height:110px;resize:vertical;}

        .emoji-row{display:flex;gap:8px;flex-wrap:wrap;}
        .emoji-btn{
            background:rgba(255,255,255,0.06);border:2px solid transparent;border-radius:14px;
            padding:10px 16px;cursor:pointer;font-size:1.5rem;transition:all 0.2s;
        }
        .emoji-btn:hover{background:rgba(108,92,231,0.2);transform:scale(1.15);}
        .emoji-btn.selected{border-color:var(--primary);background:rgba(108,92,231,0.3);}

        .char-count{text-align:right;font-size:0.82rem;color:var(--text-dim);margin-top:5px;}
        .char-count.warn{color:var(--accent);}

        .submit-btn{
            width:100%;padding:16px;
            background:linear-gradient(135deg,var(--primary),var(--accent));
            color:white;border:none;border-radius:18px;font-size:1.15rem;font-weight:700;cursor:pointer;
            transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px;
            box-shadow:0 6px 25px rgba(108,92,231,0.3);
        }
        .submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(108,92,231,0.5);}
        .submit-btn:active{transform:translateY(0);}
        .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

        /* ===== 篩選列 ===== */
        .filter-bar{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;animation:fadeIn 0.8s ease 0.5s both;}
        .filter-btn{
            padding:9px 18px;border-radius:22px;border:1px solid var(--card-border);
            background:var(--card-bg);color:var(--text-dim);cursor:pointer;font-size:0.88rem;transition:all 0.3s;
        }
        .filter-btn:hover{border-color:var(--primary);color:var(--text);}
        .filter-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
        .search-box{
            flex:1;min-width:160px;padding:9px 18px;border-radius:22px;
            border:1px solid var(--card-border);background:var(--card-bg);
            color:var(--text);font-size:0.88rem;outline:none;
        }
        .search-box:focus{border-color:var(--primary);}

        /* ===== 留言列表 ===== */
        .guestbook-list{display:flex;flex-direction:column;gap:18px;margin-bottom:32px;}
        .message-card{
            background:var(--gradient-card);backdrop-filter:blur(12px);
            border-radius:24px;padding:24px;border:1px solid var(--card-border);
            animation:cardIn 0.5s ease both;transition:all 0.3s;
        }
        .message-card:hover{border-color:rgba(108,92,231,0.4);box-shadow:0 8px 30px rgba(108,92,231,0.12);}
        .msg-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
        .msg-author{display:flex;align-items:center;gap:12px;}
        .msg-avatar{
            font-size:2.1rem;width:50px;height:50px;display:flex;align-items:center;justify-content:center;
            background:linear-gradient(135deg,rgba(108,92,231,0.15),rgba(253,121,168,0.15));
            border-radius:50%;border:2px solid rgba(108,92,231,0.25);
        }
        .msg-name{font-weight:700;color:var(--text-bright);font-size:1rem;}
        .msg-time{color:var(--text-dim);font-size:0.72rem;margin-top:2px;}
        .msg-actions{display:flex;gap:6px;}
        .action-btn{
            background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
            border-radius:12px;padding:7px 12px;cursor:pointer;font-size:0.88rem;transition:all 0.2s;color:var(--text-dim);
        }
        .action-btn:hover{background:rgba(108,92,231,0.2);border-color:var(--primary);color:var(--primary-light);}
        .action-btn.liked{color:var(--accent);}
        .msg-text{color:var(--text);line-height:1.8;font-size:0.97rem;white-space:pre-wrap;word-break:break-word;}

        /* ===== 回覆區 ===== */
        .replies-section{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08);}
        .reply-toggle{
            background:none;border:none;color:var(--primary-light);cursor:pointer;font-size:0.88rem;padding:4px 0;
            display:flex;align-items:center;gap:4px;
        }
        .reply-toggle:hover{color:var(--text-bright);}
        .replies-list{margin-top:12px;display:none;flex-direction:column;gap:10px;}
        .replies-list.open{display:flex;}
        .reply-card{background:rgba(108,92,231,0.1);border-radius:16px;padding:16px 18px;border-left:3px solid var(--primary);}
        .reply-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
        .reply-author{font-size:0.88rem;font-weight:700;color:var(--primary-light);}
        .reply-time{font-size:0.72rem;color:var(--text-dim);}
        .reply-text{color:var(--text);font-size:0.92rem;line-height:1.6;white-space:pre-wrap;}
        .reply-form{margin-top:12px;display:flex;gap:8px;}
        .reply-form input{
            flex:1;padding:11px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:12px;
            background:rgba(255,255,255,0.06);color:var(--text-bright);font-size:0.88rem;outline:none;
        }
        .reply-form input:focus{border-color:var(--primary);}
        .reply-form button{
            padding:11px 18px;border:none;border-radius:12px;background:var(--primary);color:white;cursor:pointer;
            font-size:0.88rem;font-weight:700;transition:all 0.2s;
        }
        .reply-form button:hover{background:var(--accent);}

        /* ===== 管理面板 ===== */
        .admin-panel{background:var(--card-bg);border-radius:22px;padding:22px;margin-bottom:22px;border:1px solid rgba(253,121,168,0.3);display:none;}
        .admin-panel.open{display:block;}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
        .admin-header h3{color:var(--accent);font-size:1.05rem;}
        .admin-close{background:none;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer;}
        .admin-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
        .admin-delete-btn{background:rgba(255,0,0,0.12);border:1px solid rgba(255,0,0,0.25);color:#ff7675;padding:7px 14px;border-radius:10px;cursor:pointer;font-size:0.82rem;}
        .admin-delete-btn:hover{background:rgba(255,0,0,0.25);}

        /* ===== 載入/空狀態 ===== */
        .loading{text-align:center;padding:50px 20px;color:var(--primary-light);font-size:1.1rem;}
        .loading .spinner{display:inline-block;width:42px;height:42px;border:3px solid rgba(108,92,231,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}
        .empty-state .emoji{font-size:4.5rem;display:block;margin-bottom:16px;animation:pawBounce 2s infinite;}
        .error-msg{text-align:center;padding:22px;color:#ff7675;background:rgba(255,0,0,0.08);border-radius:16px;margin-bottom:22px;border:1px solid rgba(255,0,0,0.15);}

        /* ===== Toast ===== */
        .toast{
            position:fixed;top:24px;right:24px;padding:16px 28px;border-radius:16px;font-weight:600;z-index:2000;
            transform:translateX(130%);transition:transform 0.4s ease;
        }
        .toast.show{transform:translateX(0);}
        .toast.success{background:linear-gradient(135deg,#00b894,#00cec9);color:white;box-shadow:0 8px 30px rgba(0,184,148,0.3);}
        .toast.error{background:linear-gradient(135deg,#d63031,#e17055);color:white;box-shadow:0 8px 30px rgba(214,48,49,0.3);}

        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

        .back-top{
            position:fixed;bottom:30px;right:30px;width:52px;height:52px;border-radius:50%;
            background:var(--primary);color:white;border:none;font-size:1.4rem;cursor:pointer;
            opacity:0;transition:all 0.3s;z-index:100;box-shadow:0 4px 18px rgba(108,92,231,0.4);
        }
        .back-top.show{opacity:1;}
        .back-top:hover{transform:translateY(-3px);}

        .status-indicator{
            display:inline-flex;align-items:center;gap:5px;padding:5px 14px;
            border-radius:20px;font-size:0.78rem;font-weight:600;margin-top:8px;
        }
        .status-indicator.online{background:rgba(0,184,148,0.15);color:#00b894;}
        .status-indicator.offline{background:rgba(214,48,49,0.15);color:#ff7675;}
        .status-dot{width:7px;height:7px;border-radius:50%;}
        .status-indicator.online .status-dot{background:#00b894;box-shadow:0 0 6px #00b894;}
        .status-indicator.offline .status-dot{background:#ff7675;}

        @media(max-width:600px){
            .header h1{font-size:2rem;}
            .header .logo{font-size:3.5rem;}
            .form-card{padding:22px;border-radius:22px;}
            .msg-avatar{width:42px;height:42px;font-size:1.7rem;}
            .stats-bar{padding:12px;gap:6px;}
            .stat-num{font-size:1.5rem;}
        }
    </style>
</head>
<body>
    <canvas id="stars-canvas"></canvas>

    <div class="container">
        <div class="header">
            <div class="logo">🐾</div>
            <h1>小蝦留言板</h1>
            <p>留下你的足跡，讓溫暖蔓延 ✨</p>
            <div class="visitor-count" id="visitorCount">👁️ 歡迎來訪！</div>
            <div class="status-indicator" id="statusIndicator"><span class="status-dot"></span><span class="status-text"></span></div>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><div class="stat-num" id="totalMsgs">0</div><div class="stat-label">💬 總留言</div></div>
            <div class="stat-item"><div class="stat-num" id="totalReplies">0</div><div class="stat-label">🔁 總回覆</div></div>
            <div class="stat-item"><div class="stat-num" id="totalLikes">0</div><div class="stat-label">❤️ 總按讚</div></div>
            <div class="stat-item"><div class="stat-num" id="todayMsgs">0</div><div class="stat-label">📅 今日留言</div></div>
        </div>

        <div class="form-card">
            <h2>✍️ 寫下留言</h2>
            <div class="form-group">
                <label>👤 你的名字</label>
                <input type="text" id="name" placeholder="輸入你的名字..." maxlength="20">
            </div>
            <div class="form-group">
                <label>🎭 選擇表情</label>
                <div class="emoji-row" id="emojiRow">
                    <button class="emoji-btn selected" data-emoji="🐾" onclick="selectEmoji(this)">🐾</button>
                    <button class="emoji-btn" data-emoji="🌟" onclick="selectEmoji(this)">🌟</button>
                    <button class="emoji-btn" data-emoji="💙" onclick="selectEmoji(this)">💙</button>
                    <button class="emoji-btn" data-emoji="🎈" onclick="selectEmoji(this)">🎈</button>
                    <button class="emoji-btn" data-emoji="🌸" onclick="selectEmoji(this)">🌸</button>
                    <button class="emoji-btn" data-emoji="🎀" onclick="selectEmoji(this)">🎀</button>
                    <button class="emoji-btn" data-emoji="✨" onclick="selectEmoji(this)">✨</button>
                    <button class="emoji-btn" data-emoji="🦋" onclick="selectEmoji(this)">🦋</button>
                    <button class="emoji-btn" data-emoji="🐱" onclick="selectEmoji(this)">🐱</button>
                    <button class="emoji-btn" data-emoji="🌈" onclick="selectEmoji(this)">🌈</button>
                    <button class="emoji-btn" data-emoji="🎮" onclick="selectEmoji(this)">🎮</button>
                    <button class="emoji-btn" data-emoji="🚀" onclick="selectEmoji(this)">🚀</button>
                </div>
            </div>
            <div class="form-group">
                <label>💬 留言內容</label>
                <textarea id="message" placeholder="說點什麼吧...（最多 500 字）" maxlength="500" oninput="updateCharCount()"></textarea>
                <div class="char-count" id="charCount">0 / 500</div>
            </div>
            <button class="submit-btn" id="submitBtn" onclick="submitMessage()">🐾 送出留言</button>
        </div>

        <div class="filter-bar">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜尋留言..." oninput="filterMessages()">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">全部</button>
            <button class="filter-btn" data-filter="recent" onclick="setFilter('recent', this)">最新</button>
            <button class="filter-btn" data-filter="popular" onclick="setFilter('popular', this)">熱門</button>
            <button class="filter-btn" data-filter="admin" onclick="toggleAdmin()" title="管理">⚙️</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <div class="admin-header">
                <h3>🔐 管理員面板</h3>
                <button class="admin-close" onclick="toggleAdmin()">✕</button>
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" id="adminPass" placeholder="輸入管理密碼..." style="padding:12px 16px;">
            </div>
            <button class="submit-btn" style="padding:12px;margin-top:5px;" onclick="verifyAdmin()">登入</button>
            <div id="adminList" style="margin-top:16px;display:none;"></div>
        </div>

        <div class="guestbook-list" id="guestbookList">
            <div class="loading"><div class="spinner"></div><p>正在載入留言...</p></div>
        </div>

        <div style="text-align:center;padding:24px 0;">
            <a href="index.html" style="color:var(--primary-light);text-decoration:none;font-weight:600;font-size:1rem;">← 回到導航首頁</a>
        </div>
    </div>

    <button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</button>

    <script>
    // ===== Supabase 設定 =====
    const SUPABASE_URL = 'https://rfoaoksswqgldjxjtmmg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_gvB1HCAkwjp8asQYwcoxIw_zyoOJOoc';
    const ADMIN_PASSWORD = 'xiaoxia2026';

    // ===== 本地備份儲存 =====
    const LOCAL_STORAGE_KEY = 'xiaoxia_guestbook_backup';

    function getLocalMessages() {
        try {
            return JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
        } catch { return []; }
    }

    function saveToLocal(msgs) {
        try {
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(msgs));
        } catch(e) { /* storage full */ }
    }

    function addLocalMessage(msg) {
        const msgs = getLocalMessages();
        msg.id = msg.id || 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
        msg.created_at = msg.created_at || new Date().toISOString();
        msgs.unshift(msg);
        if(msgs.length > 200) msgs.pop();
        saveToLocal(msgs);
        return msg;
    }

    function updateLocalMessage(id, updates) {
        const msgs = getLocalMessages();
        const idx = msgs.findIndex(m => m.id === id);
        if(idx >= 0) { Object.assign(msgs[idx], updates); saveToLocal(msgs); }
    }

    function deleteLocalMessage(id) {
        const msgs = getLocalMessages().filter(m => m.id !== id);
        saveToLocal(msgs);
    }

    // ===== Supabase 連線狀態 =====
    let supabaseOnline = false;

    function checkSupabaseConnection() {
        return fetch(SUPABASE_URL + '/rest/v1/guestbook?select=id&limit=1', {
            headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
        }).then(r => r.ok).catch(() => false);
    }

    function setStatus(online) {
        supabaseOnline = online;
        const el = document.getElementById('statusIndicator');
        const dot = el.querySelector('.status-dot');
        const text = el.querySelector('.status-text');
        if(online) {
            el.className = 'status-indicator online';
            text.textContent = 'Supabase 連線正常';
        } else {
            el.className = 'status-indicator offline';
            text.textContent = '使用離線模式（本地儲存）';
        }
    }

    // ===== 星空粒子背景 =====
    const starsCanvas = document.getElementById('stars-canvas');
    const sCtx = starsCanvas.getContext('2d');
    let starParticles = [];

    function initStars() {
        starsCanvas.width = window.innerWidth;
        starsCanvas.height = window.innerHeight;
        starParticles = [];
        for(let i=0;i<120;i++){
            starParticles.push({
                x:Math.random()*starsCanvas.width,y:Math.random()*starsCanvas.height,
                size:Math.random()*2+0.5,speed:Math.random()*0.6+0.1,
                opacity:Math.random(),dir:Math.random()>0.5?1:-1,
                hue:Math.random()>0.5?260:330
            });
        }
    }

    function animateStars() {
        sCtx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
        starParticles.forEach(s=>{
            s.y-=s.speed;s.opacity+=s.dir*0.004;
            if(s.opacity>=1){s.opacity=1;s.dir=-1;}
            if(s.opacity<=0){s.opacity=0;s.dir=1;}
            if(s.y<0){s.y=starsCanvas.height;s.x=Math.random()*starsCanvas.width;}
            sCtx.save();
            sCtx.globalAlpha=s.opacity*0.7;
            sCtx.fillStyle=`hsla(${s.hue},70%,75%,1)`;
            sCtx.beginPath();
            sCtx.arc(s.x,s.y,s.size,0,Math.PI*2);
            sCtx.fill();
            sCtx.restore();
        });
        requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize',()=>{initStars();});
    initStars();
    animateStars();

    // ===== Emoji 選擇 =====
    let selectedEmoji='🐾';
    function selectEmoji(btn){
        document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');selectedEmoji=btn.dataset.emoji;
    }

    // ===== 字數統計 =====
    function updateCharCount(){
        const len=document.getElementById('message').value.length;
        const el=document.getElementById('charCount');
        el.textContent=len+' / 500';
        el.className='char-count'+(len>450?' warn':'');
    }

    // ===== 篩選 =====
    let currentFilter='all';
    function setFilter(filter,btn){
        currentFilter=filter;
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');filterMessages();
    }
    function toggleAdmin(){document.getElementById('adminPanel').classList.toggle('open');}

    function filterMessages(){
        const query=document.getElementById('searchBox').value.toLowerCase();
        let filtered=allMessages.filter(m=>{
            const matchSearch=!query||m.name.toLowerCase().includes(query)||m.message.toLowerCase().includes(query);
            if(!matchSearch)return false;
            if(currentFilter==='recent'){const d=new Date(m.created_at);const now=new Date();return(now-d)<86400000*7;}
            if(currentFilter==='popular')return(m.likes||0)>0;
            return true;
        });
        renderMessages(filtered);
    }

    // ===== 載入留言 =====
    let allMessages=[];

    async function loadMessages(){
        try {
            const res=await fetch(SUPABASE_URL+'/rest/v1/guestbook?select=*&order=created_at.desc&limit=100', {
                headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'}
            });
            if(res.ok){
                const msgs=await res.json();
                allMessages=msgs;
                setStatus(true);
                updateStats(msgs);
                filterMessages();
                return;
            }
        } catch(err){
            console.log('Supabase 不可用，使用本地備份:', err.message);
        }
        // 備用：本地訊息
        setStatus(false);
        allMessages=getLocalMessages();
        if(allMessages.length===0){
            allMessages=[
                {id:'demo_1',name:'小蝦','emoji':'🦐',message:'歡迎來到我的留言板！留下你的足跡吧～',likes:5,replies:[],created_at:new Date(Date.now()-3600000).toISOString()},
                {id:'demo_2',name:'訪客','emoji':'🌟',message:'這裡的设计好好看！',likes:3,replies:[],created_at:new Date(Date.now()-7200000).toISOString()},
            ];
        }
        updateStats(allMessages);
        filterMessages();
    }

    function updateStats(msgs){
        document.getElementById('totalMsgs').textContent=msgs.length;
        let totalReplies=0,totalLikes=0;
        msgs.forEach(m=>{totalReplies+=(m.replies||[]).length;totalLikes+=(m.likes||0);});
        document.getElementById('totalReplies').textContent=totalReplies;
        document.getElementById('totalLikes').textContent=totalLikes;
        const today=new Date().toDateString();
        const todayCount=msgs.filter(m=>new Date(m.created_at).toDateString()===today).length;
        document.getElementById('todayMsgs').textContent=todayCount;
    }

    // ===== 渲染留言 =====
    function renderMessages(msgs){
        if(msgs.length===0){
            document.getElementById('guestbookList').innerHTML='<div class="empty-state"><span class="emoji">💬</span><p>還沒有留言，來寫第一則吧！</p></div>';
            return;
        }
        document.getElementById('guestbookList').innerHTML=msgs.map((m,idx)=>{
            const likes=m.likes||0;
            const isLiked=likedIds[m.id]||false;
            const replies=m.replies||[];
            return `
                <div class="message-card" style="animation-delay:${idx*0.04}s" data-id="${m.id}">
                    <div class="msg-header">
                        <div class="msg-author">
                            <div class="msg-avatar">${m.emoji||'🐾'}</div>
                            <div>
                                <div class="msg-name">${escapeHtml(m.name)}</div>
                                <div class="msg-time">${timeAgo(new Date(m.created_at))}</div>
                            </div>
                        </div>
                        <div class="msg-actions">
                            <button class="action-btn ${isLiked?'liked':''}" onclick="toggleLike('${m.id}',this)" title="按讚">${isLiked?'❤️':'🤍'} ${likes}</button>
                            <button class="action-btn" onclick="toggleReplies('${m.id}')" title="回覆">💬 ${replies.length}</button>
                            ${isAdmin?`<button class="action-btn" onclick="adminDelete('${m.id}')" title="刪除">🗑️</button>`:''}
                        </div>
                    </div>
                    <div class="msg-text">${escapeHtml(m.message)}</div>
                    <div class="replies-section">
                        <button class="reply-toggle" onclick="toggleReplies('${m.id}')">${replies.length>0?'▼ 查看回覆 ('+replies.length+')':'▽ 回覆此留言'}</button>
                        <div class="replies-list" id="replies-${m.id}">
                            ${replies.map(r=>`<div class="reply-card"><div class="reply-header"><span class="reply-author">${escapeHtml(r.author)}</span><span class="reply-time">${timeAgo(new Date(r.created_at))}</span></div><div class="reply-text">${escapeHtml(r.text)}</div></div>`).join('')}
                            <div class="reply-form">
                                <input type="text" id="reply-input-${m.id}" placeholder="回覆 ${escapeHtml(m.name)}..." maxlength="300">
                                <button onclick="submitReply('${m.id}')">送出</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ===== 按讚 =====
    let likedIds=JSON.parse(localStorage.getItem('gb_likes')||'{}');

    async function toggleLike(id,btn){
        try{
            const msg=allMessages.find(m=>m.id===id);
            if(!msg)return;
            const newLikes=(msg.likes||0)+(likedIds[id]?-1:1);
            likedIds[id]=!likedIds[id];
            localStorage.setItem('gb_likes',JSON.stringify(likedIds));
            // Supabase
            if(supabaseOnline){
                await fetch(SUPABASE_URL+'/rest/v1/guestbook?id=eq.'+id,{
                    method:'PATCH',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
                    body:JSON.stringify({likes:newLikes})
                });
                loadMessages();
            } else {
                // 本地更新
                updateLocalMessage(id,{likes:newLikes});
                updateStats(getLocalMessages());
                filterMessages();
            }
        }catch(e){
            showToast('按讚失敗：'+e.message,'error');
        }
    }

    function toggleReplies(id){const el=document.getElementById('replies-'+id);if(el)el.classList.toggle('open');}

    async function submitReply(msgId){
        const input=document.getElementById('reply-input-'+msgId);
        const text=input.value.trim();
        if(!text){showToast('回覆內容不能空白','error');return;}
        const msg=allMessages.find(m=>m.id===msgId);
        const oldReplies=msg?msg.replies:[];
        const newReply={author:'訪客',text,created_at:new Date().toISOString()};
        if(supabaseOnline){
            try{
                const res=await fetch(SUPABASE_URL+'/rest/v1/guestbook?id=eq.'+msgId,{
                    method:'PATCH',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
                    body:JSON.stringify({replies:[...oldReplies,newReply]})
                });
                if(res.ok){showToast('回覆成功！','success');loadMessages();}
                else showToast('回覆失敗','error');
            }catch(e){showToast('回覆失敗：'+e.message,'error');}
        } else {
            updateLocalMessage(msgId,{replies:[...oldReplies,{author:'訪客',text:text,created_at:new Date().toISOString()}]});
            showToast('回覆成功！（離線模式）','success');
            loadMessages();
        }
    }

    // ===== 送出留言 =====
    async function submitMessage(){
        const name=document.getElementById('name').value.trim();
        const text=document.getElementById('message').value.trim();
        const btn=document.getElementById('submitBtn');
        if(!name){showToast('請輸入名字哦！','error');return;}
        if(!text){showToast('請輸入留言內容哦！','error');return;}

        btn.disabled=true;btn.innerHTML='⏳ 送出中...';

        const msgData={name,emoji:selectedEmoji,message:text,likes:0,replies:[]};

        if(supabaseOnline){
            try{
                const res=await fetch(SUPABASE_URL+'/rest/v1/guestbook',{
                    method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
                    body:JSON.stringify(msgData)
                });
                if(res.ok){
                    document.getElementById('name').value='';document.getElementById('message').value='';updateCharCount();
                    showToast('🎉 留言成功！','success');loadMessages();
                } else {
                    throw new Error('HTTP '+res.status);
                }
            }catch(err){
                console.log('Supabase 失敗，使用本地儲存:',err.message);
                // 自動備份到本地
                addLocalMessage(msgData);
                document.getElementById('name').value='';document.getElementById('message').value='';updateCharCount();
                showToast('🎉 留言已儲存！（離線模式）','success');
                setStatus(false);loadMessages();
            }
        } else {
            // 完全離線模式
            addLocalMessage(msgData);
            document.getElementById('name').value='';document.getElementById('message').value='';updateCharCount();
            showToast('🎉 留言已儲存！（離線模式）','success');loadMessages();
        }
        btn.disabled=false;btn.innerHTML='🐾 送出留言';
    }

    // ===== 管理員 =====
    let isAdmin=false;
    async function verifyAdmin(){
        const pass=document.getElementById('adminPass').value;
        if(pass===ADMIN_PASSWORD){
            isAdmin=true;showToast('管理員模式已開啟！','success');filterMessages();
        }else{showToast('密碼錯誤','error');}
    }
    async function adminDelete(id){
        if(!confirm('確定要刪除這則留言？'))return;
        if(supabaseOnline){
            const res=await fetch(SUPABASE_URL+'/rest/v1/guestbook?id=eq.'+id,{method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
            if(res.ok){showToast('已刪除','success');loadMessages();}else showToast('刪除失敗','error');
        } else {
            deleteLocalMessage(id);showToast('已刪除（本地）','success');loadMessages();
        }
    }

    // ===== 工具函數 =====
    function escapeHtml(str){const d=document.createElement('div');d.textContent=str;return d.innerHTML;}
    function timeAgo(date){
        const s=Math.floor((new Date()-date)/1000);
        if(s<60)return'剛剛';if(s<3600)return Math.floor(s/60)+' 分鐘前';
        if(s<86400)return Math.floor(s/3600)+' 小時前';if(s<604800)return Math.floor(s/86400)+' 天前';
        return date.toLocaleDateString('zh-TW');
    }
    function showToast(text,type){
        const t=document.createElement('div');t.className='toast '+type;t.textContent=text;
        document.body.appendChild(t);setTimeout(()=>t.classList.add('show'),10);
        setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),500);},3500);
    }

    window.addEventListener('scroll',()=>{document.getElementById('backTop').classList.toggle('show',window.scrollY>300);});

    // 初始化
    loadMessages();
    setInterval(loadMessages,60000);
    </script>
</body>
</html>
