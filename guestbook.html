<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小蝦留言板 🐾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #e8f4fd 0%, #d1ecf9 30%, #b8e0f5 60%, #a0cceb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 標題區域 */
        .header {
            text-align: center;
            padding: 30px 0;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #1a5276;
            margin-bottom: 8px;
        }

        .header p {
            color: #5dade2;
            font-size: 1rem;
        }

        .header .paw {
            font-size: 3rem;
            display: inline-block;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 留言表單 */
        .form-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(26, 82, 118, 0.12);
            border: 1px solid rgba(93, 173, 226, 0.2);
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .form-card h2 {
            color: #1a5276;
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #2e86c1;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #d4e6f1;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
            background: white;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .emoji-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .emoji-btn {
            background: rgba(52, 152, 219, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.2s ease;
        }

        .emoji-btn:hover {
            background: rgba(52, 152, 219, 0.2);
            transform: scale(1.15);
        }

        .emoji-btn.selected {
            border-color: #3498db;
            background: rgba(52, 152, 219, 0.25);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #2980b9, #1a6fa0);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* 留言列表 */
        .guestbook-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(26, 82, 118, 0.08);
            border: 1px solid rgba(93, 173, 226, 0.15);
            animation: fadeInUp 0.5s ease;
            transition: transform 0.2s ease;
        }

        .message-card:hover {
            transform: translateY(-3px);
        }

        .message-card .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .message-card .msg-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message-card .msg-avatar {
            font-size: 1.8rem;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #d4e6f1, #aed6f1);
            border-radius: 50%;
        }

        .message-card .msg-name {
            font-weight: bold;
            color: #1a5276;
            font-size: 1.05rem;
        }

        .message-card .msg-time {
            color: #85c1e9;
            font-size: 0.8rem;
        }

        .message-card .msg-text {
            color: #2c3e50;
            line-height: 1.7;
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .message-card .msg-delete {
            cursor: pointer;
            color: #ddd;
            font-size: 1.2rem;
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 4px 8px;
        }

        .message-card .msg-delete:hover {
            color: #e74c3c;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #85c1e9;
        }

        .empty-state .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }

        /* 統計列 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            margin-bottom: 20px;
            color: #2e86c1;
            font-size: 0.9rem;
        }

        .clear-btn {
            background: none;
            border: 1px solid #aed6f1;
            color: #85c1e9;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #fdebd0;
            border-color: #f39c12;
            color: #e67e22;
        }

        /* 回到首頁 */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            margin-bottom: 30px;
            color: #2e86c1;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
            text-align: center;
            width: 100%;
        }

        .back-link:hover {
            color: #1a5276;
        }

        /* 成功動畫 */
        .success-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 8px 30px rgba(46, 204, 113, 0.3);
            z-index: 1000;
            animation: slideInRight 0.5s ease, fadeOut 0.5s ease 2.5s forwards;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-20px); }
        }

        @media (max-width: 500px) {
            .header h1 { font-size: 1.8rem; }
            .form-card { padding: 20px; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="paw">🐾</span>
            <h1>小蝦留言板</h1>
            <p>留下你的足跡，讓溫暖蔓延 ✨</p>
        </div>

        <div class="form-card">
            <h2>📝 寫下留言</h2>

            <div class="form-group">
                <label>你的名字</label>
                <input type="text" id="name" placeholder="輸入你的名字..." maxlength="20">
            </div>

            <div class="form-group">
                <label>選擇表情</label>
                <div class="emoji-picker">
                    <button class="emoji-btn" onclick="selectEmoji(this, '🐾')">🐾</button>
                    <button class="emoji-btn" onclick="selectEmoji(this, '🌟')">🌟</button>
                    <button class="emoji-btn" onclick="selectEmoji(this, '💙')">💙</button>
                    <button class="emoji-btn" onclick="selectEmoji(this, '🎈')">🎈</button>
                    <button class="emoji-btn" onclick="selectEmoji(this, '🌸')">🌸</button>
                    <button class="emoji-btn" onclick="selectEmoji(this, '🎀')">🎀</button>
                    <button class="emoji-btn" onclick="selectEmoji(this, '✨')">✨</button>
                    <button class="emoji-btn" onclick="selectEmoji(this, '🦋')">🦋</button>
                </div>
            </div>

            <div class="form-group">
                <label>留言內容</label>
                <textarea id="message" placeholder="說點什麼吧..."></textarea>
            </div>

            <button class="submit-btn" onclick="submitMessage()">
                🐾 送出留言
            </button>
        </div>

        <div class="stats-bar">
            <span id="msgCount">📊 共有 <strong>0</strong> 則留言</span>
            <button class="clear-btn" onclick="clearAll()">🗑️ 清除全部</button>
        </div>

        <div class="guestbook-list" id="guestbookList">
            <div class="empty-state">
                <span class="emoji">💬</span>
                <p>還沒有留言，來寫第一則吧！</p>
            </div>
        </div>

        <a href="index.html" class="back-link">← 回到導航首頁</a>
    </div>

    <script>
    let selectedEmoji = '🐾';
    let messages = [];

    // 載入留言
    function loadMessages() {
        const stored = localStorage.getItem('xiaoxia_guestbook');
        if (stored) {
            messages = JSON.parse(stored);
        }
        renderMessages();
    }

    // 儲存留言
    function saveMessages() {
        localStorage.setItem('xiaoxia_guestbook', JSON.stringify(messages));
    }

    // 選擇表情
    function selectEmoji(btn, emoji) {
        document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedEmoji = emoji;
    }

    // 送出留言
    function submitMessage() {
        const name = document.getElementById('name').value.trim();
        const text = document.getElementById('message').value.trim();

        if (!name) { alert('請輸入名字哦！'); return; }
        if (!text) { alert('請輸入留言內容哦！'); return; }

        const msg = {
            id: Date.now(),
            name: name,
            emoji: selectedEmoji,
            text: text,
            time: new Date().toLocaleString('zh-TW')
        };

        messages.unshift(msg);
        saveMessages();
        renderMessages();

        // 清空表單
        document.getElementById('name').value = '';
        document.getElementById('message').value = '';

        // 成功提示
        showToast('🎉 留言成功！');
    }

    // 渲染留言列表
    function renderMessages() {
        const list = document.getElementById('guestbookList');
        document.getElementById('msgCount').innerHTML = `📊 共有 <strong>${messages.length}</strong> 則留言`;

        if (messages.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <span class="emoji">💬</span>
                    <p>還沒有留言，來寫第一則吧！</p>
                </div>`;
            return;
        }

        list.innerHTML = messages.map(msg => `
            <div class="message-card" id="msg-${msg.id}">
                <div class="msg-header">
                    <div class="msg-author">
                        <div class="msg-avatar">${msg.emoji}</div>
                        <div>
                            <div class="msg-name">${escapeHtml(msg.name)}</div>
                            <div class="msg-time">${msg.time}</div>
                        </div>
                    </div>
                    <button class="msg-delete" onclick="deleteMessage(${msg.id})">✕</button>
                </div>
                <div class="msg-text">${escapeHtml(msg.text)}</div>
            </div>
        `).join('');
    }

    // 刪除留言
    function deleteMessage(id) {
        if (confirm('確定要刪除這則留言嗎？')) {
            messages = messages.filter(m => m.id !== id);
            saveMessages();
            renderMessages();
        }
    }

    // 清除全部
    function clearAll() {
        if (messages.length === 0) return;
        if (confirm('確定要清除所有留言嗎？此動作無法復原！')) {
            messages = [];
            saveMessages();
            renderMessages();
        }
    }

    // 防 XSS
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // 成功提示
    function showToast(text) {
        const toast = document.createElement('div');
        toast.className = 'success-toast';
        toast.textContent = text;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // 初始化
    loadMessages();
    </script>
</body>
</html>
