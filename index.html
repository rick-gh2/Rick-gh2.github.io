<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有一個重要的邀請給你 ✨</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            position: relative;
        }
        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            height: 50px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }
        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff1a43;
        }
        #noBtn {
            background-color: #aaa;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container" id="quizBox">
        <h1>✨ 誠摯的約會邀請 ✨</h1>
        <p>這週末有空一起去喝杯咖啡、吃個甜點嗎？<br>（聽說那家店的草莓蛋糕超厲害！）</p>
        
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">好哇！</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">不要</button>
        </div>
    </div>

    <script>
        // 當滑鼠移到「不要」按鈕上時，按鈕會隨機亂跑
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // 計算瀏覽器視窗可用寬高，避免跑出螢幕外
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            // 將按鈕改為相對於整個視窗定位
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // 點擊「好哇」之後的驚喜
        function celebrate() {
            const box = document.getElementById('quizBox');
            box.innerHTML = `
                <h1 style="font-size: 40px;">🎉 太棒了！ 🎉</h1>
                <p style="font-size: 20px; color: #ff4d6d; font-weight: bold;">那就這麼約定囉！</p>
                <p>我晚點把時間地點傳給你，<br>期待當天見面！❤️</p>
            `;
            
            // 簡單的彩色碎紙花效果
            for (let i = 0; i < 50; i++) {
                createHeart();
            }
        }

        // 製造浪漫愛心飄落效果
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>

    <style>
        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
