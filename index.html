<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小蝦的網頁世界 🦐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #06060f;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border-card: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f5;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --accent-1: #ff6b9d;
            --accent-2: #c084fc;
            --accent-3: #48dbfb;
            --accent-4: #feca57;
            --accent-5: #ff9ff3;
            --glow-1: rgba(255, 107, 157, 0.25);
            --glow-2: rgba(192, 132, 252, 0.25);
            --radius: 24px;
        }

        body {
            font-family: 'Noto Sans TC', 'Space Grotesk', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            color: var(--text-primary);
        }

        /* ====== Canvas & Glow ====== */
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb.g1 { top: -200px; left: -100px; background: var(--accent-1); animation: orbDrift1 14s ease-in-out infinite; }
        .glow-orb.g2 { bottom: -250px; right: -150px; background: var(--accent-3); animation: orbDrift2 16s ease-in-out infinite; }
        .glow-orb.g3 { top: 40%; left: 60%; background: var(--accent-2); animation: orbDrift3 20s ease-in-out infinite; }
        .glow-orb.g4 { top: 60%; left: 10%; background: var(--accent-4); width: 350px; height: 350px; opacity: 0.07; animation: orbDrift4 18s ease-in-out infinite; }

        @keyframes orbDrift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(120px,80px)} }
        @keyframes orbDrift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-100px,-90px)} }
        @keyframes orbDrift3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-40%,-60%) scale(1.3)} }
        @keyframes orbDrift4 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,70px)} }

        /* ====== Music Toggle ====== */
        .music-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px) saturate(1.5);
            -webkit-backdrop-filter: blur(16px) saturate(1.5);
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        .music-toggle:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.25);
            transform: scale(1.08);
            box-shadow: 0 6px 32px rgba(0,0,0,0.4);
        }
        .music-toggle.playing .bar {
            animation: barPulse 0.55s ease-in-out infinite alternate;
        }
        .music-toggle .bar {
            display: inline-block;
            width: 3px;
            margin: 0 1.5px;
            height: 18px;
            background: white;
            border-radius: 2px;
            animation: barPulse 0.55s ease-in-out infinite alternate;
        }
        .music-toggle .bar:nth-child(1) { animation-delay: 0s; }
        .music-toggle .bar:nth-child(2) { animation-delay: 0.14s; }
        .music-toggle .bar:nth-child(3) { animation-delay: 0.28s; }
        .music-toggle .bar:nth-child(4) { animation-delay: 0.42s; }

        @keyframes barPulse { from { height: 6px; } to { height: 20px; } }

        .music-toggle.paused .bar {
            animation: none;
            height: 4px;
            opacity: 0.35;
        }

        /* ====== Header ====== */
        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 48px;
            margin-top: 20px;
        }

        .header-emoji {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 12px;
            animation: headerBounce 2.5s ease-in-out infinite;
        }

        @keyframes headerBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        .title {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3), var(--accent-4), var(--accent-5), var(--accent-1));
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease infinite;
            margin-bottom: 14px;
            text-shadow: none;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-weight: 300;
            letter-spacing: 0.04em;
            animation: fadeUp 1s ease 0.3s both;
            position: relative;
            display: inline-block;
        }

        .subtitle::after {
            content: '';
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: var(--accent-3);
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 0.9s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        @keyframes fadeUp {
            from { transform: translateY(18px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ====== Nav Grid ====== */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 880px;
            width: calc(100% - 40px);
            position: relative;
            z-index: 1;
        }

        .nav-card {
            position: relative;
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border: 1px solid var(--border-card);
            border-radius: var(--radius);
            padding: 36px 24px 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 170px;
            isolation: isolate;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .nav-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            background: var(--card-glow, transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.18);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px var(--card-glow, transparent);
        }

        .nav-card:hover::before { opacity: 1; }
        .nav-card:hover::after { opacity: 1; }

        .nav-card > * { position: relative; z-index: 1; }

        /* Per-card accent */
        .nav-card[data-accent="rose"]    { --card-glow: rgba(255,107,157,0.12); }
        .nav-card[data-accent="purple"]   { --card-glow: rgba(192,132,252,0.12); }
        .nav-card[data-accent="cyan"]     { --card-glow: rgba(72,219,251,0.12); }
        .nav-card[data-accent="yellow"]   { --card-glow: rgba(254,202,87,0.12); }
        .nav-card[data-accent="pink"]     { --card-glow: rgba(255,159,243,0.12); }
        .nav-card[data-accent="green"]    { --card-glow: rgba(46,204,113,0.12); }
        .nav-card[data-accent="orange"]   { --card-glow: rgba(255,165,0,0.12); }
        .nav-card[data-accent="blue"]     { --card-glow: rgba(99,179,237,0.12); }
        .nav-card[data-accent="teal"]     { --card-glow: rgba(0,206,209,0.12); }

        /* card icon ring */
        .card-icon-wrap {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .card-icon-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--ring-color, rgba(255,255,255,0.08));
            transition: all 0.4s ease;
        }

        .nav-card:hover .card-icon-wrap {
            transform: scale(1.12);
        }
        .nav-card:hover .card-icon-wrap::before {
            background: var(--ring-color-hover, rgba(255,255,255,0.15));
        }

        .nav-card .emoji {
            font-size: 1.8rem;
            position: relative;
            z-index: 1;
            line-height: 1;
        }

        .nav-card .label {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.01em;
        }

        .nav-card .desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .nav-card .card-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            margin-top: 14px;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .nav-card:hover .card-arrow {
            opacity: 0.8;
            transform: translateX(0);
            background: rgba(255,255,255,0.12);
        }

        /* ====== Footer ====== */
        .footer {
            position: fixed;
            bottom: 28px;
            color: rgba(255,255,255,0.2);
            font-size: 0.82rem;
            z-index: 1;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        /* ====== Music Hint ====== */
        .music-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 18px 36px;
            border-radius: 18px;
            font-size: 1rem;
            z-index: 200;
            animation: hintAnim 2.8s ease forwards;
            pointer-events: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        @keyframes hintAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
            12% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            65% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* ====== Stagger card entrance ====== */
        .nav-card { opacity: 0; transform: translateY(30px); }
        .nav-card.visible {
            animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ====== Responsive ====== */
        @media (max-width: 900px) {
            .nav-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
            .nav-card { padding: 30px 18px 28px; min-height: 155px; }
            .card-icon-wrap { width: 58px; height: 58px; }
            .nav-card .emoji { font-size: 1.6rem; }
        }

        @media (max-width: 640px) {
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
                width: calc(100% - 28px);
            }
            .nav-card {
                padding: 28px 16px 26px;
                min-height: 145px;
            }
            .card-icon-wrap { width: 52px; height: 52px; margin-bottom: 12px; }
            .nav-card .emoji { font-size: 1.5rem; }
            .nav-card .label { font-size: 1.05rem; }
            .nav-card .desc { font-size: 0.78rem; }
            .header { margin-bottom: 36px; }
            .header-emoji { font-size: 2.8rem; }
            .glow-orb { width: 350px; height: 350px; }
        }

        @media (max-width: 400px) {
            .title { font-size: 1.7rem; }
            .subtitle { font-size: 0.88rem; }
            .nav-grid { gap: 12px; }
            .music-toggle { width: 44px; height: 44px; top: 16px; right: 16px; }
        }
    </style>
</head>

    <script>
    // ====== 科技風背景音樂 ======
    let musicCtx = null;
    let musicPlaying = false;
    let musicLoopId = null;

    // === Chrono Trigger 風格像素 RPG BGM (16-bit Adventure) ===
    // 經典超時空之鑰配樂風格：輕快的冒险旋律 + 8-bit 方波 + 三角波貝斯 + 琶音和弦

    const CT = {
        // 旋律（類似超時空之鑰的明亮冒险旋律）
        melody: [
            // 樂句 1: 輕快上行旋律
            [329.63,392.00,440.00,523.25,440.00,392.00,329.63,261.63],
            [293.66,349.23,392.00,440.00,523.25,587.33,523.25,440.00],
            // 樂句 2: 回旋下行
            [392.00,349.23,329.63,293.66,261.63,293.66,329.63,349.23],
            [329.63,293.66,261.63,246.94,261.63,293.66,329.63,392.00],
            // 樂句 3: 高潮段落
            [523.25,659.25,587.33,523.25,440.00,493.88,523.25,587.33],
            [659.25,783.99,698.46,659.25,523.25,587.33,523.25,440.00],
            // 樂句 4: 解決
            [392.00,440.00,523.25,587.33,523.25,440.00,392.00,349.23],
            [329.63,349.23,392.00,440.00,523.25,440.00,329.63,261.63]
        ],
        // 貝斯（三角波）
        bass: [130.81,130.81,164.81,164.81,196.00,196.00,174.61,174.61],
        // 琶音和弦（方波）
        arpChords: [
            [261.63,329.63,392.00],  // C
            [196.00,246.94,329.63],  // G
            [220.00,261.63,329.63],  // A
            [174.61,220.00,261.63],  // F
            [196.00,246.94,329.63],  // G
            [164.81,196.00,246.94],  // E
            [146.83,196.00,220.00],  // D
            [174.61,220.00,261.63]   // F
        ]
    };

    function playNote(ctx, parent, type, freq, start, dur, vol) {
        const osc = ctx.createOscillator();
        osc.type = type;
        osc.frequency.value = freq;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(vol, start + 0.005);
        g.gain.exponentialRampToValueAtTime(0.001, start + dur * 0.85);
        osc.connect(g).connect(parent);
        osc.start(start);
        osc.stop(start + dur);
    }

    function playCTBGM() {
        if (!musicPlaying) return;
        const ctx = musicCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (!musicCtx) musicCtx = ctx;
        const now = ctx.currentTime;
        const loopDur = 20; // 20秒循環
        const beat = loopDur / 32; // 32拍
        const master = ctx.createGain();
        master.gain.value = 0.18;
        master.connect(ctx.destination);

        // === 旋律（方波 - 經典 8-bit 音色）===
        const mLoop = CT.melody;
        for (let bar = 0; bar < 2; bar++) { // 重複一次
            const barOff = bar * loopDur;
            for (let i = 0; i < mLoop[bar].length; i++) {
                const freq = mLoop[bar][i];
                const t = now + barOff + i * beat;
                playNote(ctx, master, 'square', freq, t, beat * 0.85, 0.10);
            }
        }

        // === 貝斯（三角波）===
        for (let bar = 0; bar < 2; bar++) {
            const barOff = bar * loopDur;
            for (let i = 0; i < CT.bass.length; i++) {
                const freq = CT.bass[i];
                const t = now + barOff + i * beat * 2;
                playNote(ctx, master, 'triangle', freq, t, beat * 1.8, 0.12);
            }
        }

        // === 琶音和弦（方波輕背景）===
        for (let bar = 0; bar < 2; bar++) {
            const barOff = bar * loopDur;
            const chord = CT.arpChords[bar];
            for (let beat_i = 0; beat_i < 8; beat_i++) {
                chord.forEach((freq, ci) => {
                    const t = now + barOff + (bar * CT.arpChords[bar].length + beat_i * 4 + ci) * beat * 0.5;
                    if (t < now + loopDur) {
                        playNote(ctx, master, 'square', freq, t, beat * 0.3, 0.025);
                    }
                });
            }
        }

        // === 節奏：輕快木琴錘音（高頻方波點綴）===
        const drumNotes = [880,1046.5,1174.66,1318.5];
        for (let i = 0; i < 16; i++) {
            const t = now + i * beat * 2;
            const freq = drumNotes[i % drumNotes.length];
            playNote(ctx, master, 'square', freq, t, beat * 0.25, 0.04);
        }

        musicLoopId = setTimeout(playCTBGM, loopDur * 1000);
    }

    function toggleMusic() {
        const btn = document.getElementById('musicBtn');
        if (!musicPlaying) {
            if (!musicCtx) musicCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (musicCtx.state === 'suspended') musicCtx.resume();
            musicPlaying = true;
            btn.classList.remove('paused');
            btn.classList.add('playing');
            playCTBGM();
        } else {
            musicPlaying = false;
            if (musicCtx) musicCtx.suspend();
            clearTimeout(musicLoopId);
            btn.classList.remove('playing');
            btn.classList.add('paused');
        }
    }

    document.addEventListener('click', function initMusic() {
        if (!musicPlaying) {
            toggleMusic();
            const hint = document.createElement('div');
            hint.className = 'music-hint';
            hint.textContent = '🎵 Chrono Trigger 風格 BGM 🎮 · 右上角按鈕可控制';
            document.body.appendChild(hint);
            setTimeout(() => hint.remove(), 2800);
        }
        document.removeEventListener('click', initMusic);
    });

    // ====== 粒子背景 ======
    const canvas = document.getElementById('particles');
    const pCtx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = (Math.random() - 0.5) * 0.8;
            this.opacity = Math.random() * 0.5 + 0.2;
            this.color = `hsl(${Math.random() * 360}, 70%, 70%)`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            if (mouse.x !== null) {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    this.x -= dx * 0.02;
                    this.y -= dy * 0.02;
                }
            }
        }
        draw() {
            pCtx.beginPath();
            pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            pCtx.fillStyle = this.color;
            pCtx.globalAlpha = this.opacity;
            pCtx.fill();
            pCtx.globalAlpha = 1;
        }
    }

    for (let i = 0; i < 100; i++) {
        particles.push(new Particle());
    }

    function connectParticles() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    pCtx.beginPath();
                    pCtx.strokeStyle = `rgba(255,255,255,${0.08 * (1 - dist / 100)})`;
                    pCtx.lineWidth = 0.5;
                    pCtx.moveTo(particles[i].x, particles[i].y);
                    pCtx.lineTo(particles[j].x, particles[j].y);
                    pCtx.stroke();
                }
            }
        }
    }

    function animate() {
        pCtx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        connectParticles();
        requestAnimationFrame(animate);
    }
    animate();

    // ====== Stagger card entrance ======
    const cards = document.querySelectorAll('.nav-card');
    cards.forEach((card, i) => {
        setTimeout(() => {
            card.classList.add('visible');
        }, 100 + i * 80);
    });
    </script>
</body>
</html>
