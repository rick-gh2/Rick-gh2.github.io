<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小蝦的網頁世界 🦐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft JhengHei', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        /* 背景星星動畫 */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.3; transform: scale(1); }
            to { opacity: 1; transform: scale(1.3); }
        }
        .title {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            z-index: 1;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
        }
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            margin-bottom: 50px;
            z-index: 1;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            max-width: 700px;
            width: 90%;
            z-index: 1;
        }
        .nav-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: block;
        }
        .nav-card:hover {
            transform: translateY(-8px) scale(1.03);
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .nav-card .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 15px;
        }
        .nav-card .label {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .nav-card .desc {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            z-index: 1;
        }
        @media (max-width: 500px) {
            .title { font-size: 1.8rem; }
            .nav-grid { gap: 15px; }
            .nav-card { padding: 25px 20px; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <h1 class="title">🦐 小蝦的網頁世界</h1>
    <p class="subtitle">歡迎來到我的小天地～點開下面的卡片探索吧！</p>

    <div class="nav-grid">
        <a href="date.html" class="nav-card">
            <span class="emoji">💌</span>
            <div class="label">約會邀請</div>
            <div class="desc">一個重要的邀請...</div>
        </a>
        <a href="space.html" class="nav-card">
            <span class="emoji">🚀</span>
            <div class="label">星戰異星戰機</div>
            <div class="desc">星際射擊小遊戲</div>
        </a>
        <a href="takoyaki.html" class="nav-card">
            <span class="emoji">🐙</span>
            <div class="label">瘋狂章魚燒</div>
            <div class="desc">趣味點擊小遊戲</div>
        </a>
    </div>

    <div class="footer">Powered by 🦐 小蝦 & GitHub Pages</div>

    <script>
        // 生成背景星星
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            starsEl.appendChild(star);
        }
    </script>
</body>
</html>
