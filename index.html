<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小蝦的網頁世界 🦐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Microsoft JhengHei', 'Arial', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .title-wrapper {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .title {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff, #ff6b6b);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite, bounceIn 1s ease;
            margin-bottom: 10px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease 0.5s both;
            position: relative;
        }

        .subtitle::after {
            content: '';
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #48dbfb;
            margin-left: 5px;
            vertical-align: middle;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 820px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        .nav-card {
            position: relative;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            display: block;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(255,255,255,0.1), transparent 30%);
            animation: rotate 4s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .nav-card:hover::before { opacity: 1; }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .nav-card::after {
            content: '';
            position: absolute;
            inset: 1px;
            background: rgba(15, 15, 30, 0.9);
            border-radius: 19px;
            z-index: 0;
        }

        .nav-card:hover {
            transform: translateY(-12px) scale(1.05);
            border-color: rgba(255,255,255,0.3);
        }

        .nav-card > * { position: relative; z-index: 1; }

        .nav-card:nth-child(1):hover { box-shadow: 0 20px 60px rgba(255,107,107,0.3); border-color: rgba(255,107,107,0.4); }
        .nav-card:nth-child(2):hover { box-shadow: 0 20px 60px rgba(72,219,251,0.3); border-color: rgba(72,219,251,0.4); }
        .nav-card:nth-child(3):hover { box-shadow: 0 20px 60px rgba(84,160,255,0.3); border-color: rgba(84,160,255,0.4); }
        .nav-card:nth-child(4):hover { box-shadow: 0 20px 60px rgba(46,204,113,0.3); border-color: rgba(46,204,113,0.4); }

        .nav-card .emoji {
            font-size: 3.2rem;
            display: block;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        .nav-card:nth-child(2) .emoji { animation-delay: 0.5s; }
        .nav-card:nth-child(3) .emoji { animation-delay: 1s; }
        .nav-card:nth-child(4) .emoji { animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .nav-card .label {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .nav-card .desc {
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .nav-card .arrow {
            display: inline-block;
            margin-top: 15px;
            font-size: 1.5rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .nav-card:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .footer {
            position: fixed;
            bottom: 25px;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            z-index: 1;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 { top: -100px; left: -100px; background: #ff6b6b; animation: glowMove1 8s ease-in-out infinite; }
        .glow-2 { bottom: -100px; right: -100px; background: #48dbfb; animation: glowMove2 10s ease-in-out infinite; }
        .glow-3 { top: 50%; left: 50%; transform: translate(-50%,-50%); background: #ff9ff3; animation: glowMove3 12s ease-in-out infinite; }

        @keyframes glowMove1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(100px,100px)} }
        @keyframes glowMove2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-80px,-80px)} }
        @keyframes glowMove3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.5)} }

        @media (max-width: 500px) {
            .title { font-size: 2rem; }
            .nav-grid { gap: 15px; grid-template-columns: repeat(2, 1fr); }
            .nav-card { padding: 25px 15px; }
            .nav-card .emoji { font-size: 2.8rem; }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>

    <div class="title-wrapper">
        <h1 class="title">🦐 小蝦的網頁世界</h1>
        <p class="subtitle">歡迎來到我的小天地～點開卡片探索吧！</p>
    </div>

    <div class="nav-grid">
        <a href="date.html" class="nav-card">
            <span class="emoji">💌</span>
            <div class="label">約會邀請</div>
            <div class="desc">一個重要的邀請...</div>
            <span class="arrow">→</span>
        </a>
        <a href="space.html" class="nav-card">
            <span class="emoji">🚀</span>
            <div class="label">星戰異星戰機</div>
            <div class="desc">星際射擊小遊戲</div>
            <span class="arrow">→</span>
        </a>
        <a href="takoyaki.html" class="nav-card">
            <span class="emoji">🐙</span>
            <div class="label">瘋狂章魚燒</div>
            <div class="desc">趣味點擊小遊戲</div>
            <span class="arrow">→</span>
        </a>
        <a href="guestbook.html" class="nav-card">
            <span class="emoji">🐾</span>
            <div class="label">小蝦留言板</div>
            <div class="desc">留下你的足跡✨</div>
            <span class="arrow">→</span>
        </a>
    </div>

    <div class="footer">Powered by 🦐 小蝦 & GitHub Pages</div>

    <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = (Math.random() - 0.5) * 0.8;
            this.opacity = Math.random() * 0.5 + 0.2;
            this.color = `hsl(${Math.random() * 360}, 70%, 70%)`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            if (mouse.x !== null) {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    this.x -= dx * 0.02;
                    this.y -= dy * 0.02;
                }
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.opacity;
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    for (let i = 0; i < 100; i++) {
        particles.push(new Particle());
    }

    function connectParticles() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(255,255,255,${0.08 * (1 - dist / 100)})`;
                    ctx.lineWidth = 0.5;
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        connectParticles();
        requestAnimationFrame(animate);
    }
    animate();
    </script>
</body>
</html>
