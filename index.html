<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小蝦的網頁世界 🦐</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦐</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050510;
            --bg-secondary: #0a0a1a;
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff00aa;
            --neon-purple: #a855f7;
            --neon-blue: #3b82f6;
            --neon-orange: #f97316;
            --neon-green: #10b981;
            --neon-pink: #ec4899;
            --card-bg: rgba(15, 15, 35, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #e2e8f0;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.3), 0 0 40px rgba(0, 240, 255, 0.1);
            --glow-magenta: 0 0 20px rgba(255, 0, 170, 0.3), 0 0 40px rgba(255, 0, 170, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans TC', 'Orbitron', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ====== Canvas Background ====== */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ====== Ambient Glow Layers ====== */
        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 1;
        }

        .glow-top-left {
            width: 600px;
            height: 600px;
            background: var(--neon-cyan);
            top: -200px;
            left: -200px;
            animation: ambientDrift1 15s ease-in-out infinite;
        }

        .glow-bottom-right {
            width: 500px;
            height: 500px;
            background: var(--neon-magenta);
            bottom: -150px;
            right: -150px;
            animation: ambientDrift2 18s ease-in-out infinite;
        }

        .glow-center {
            width: 400px;
            height: 400px;
            background: var(--neon-purple);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: ambientPulse 12s ease-in-out infinite;
        }

        @keyframes ambientDrift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, 60px) scale(1.2); }
            66% { transform: translate(-30px, 100px) scale(0.9); }
        }

        @keyframes ambientDrift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-60px, -80px) scale(1.1); }
            66% { transform: translate(50px, -40px) scale(0.85); }
        }

        @keyframes ambientPulse {
            0%, 100% { opacity: 0.08; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.18; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* ====== Scanline Overlay ====== */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
        }

        /* ====== Main Container ====== */
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 40px;
        }

        /* ====== Top Status Bar ====== */
        .status-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInDown 0.8s ease 0.2s forwards;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-text {
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .music-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .music-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }

        .music-btn.playing {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        .music-bars {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 18px;
        }

        .music-bars span {
            display: block;
            width: 3px;
            background: currentColor;
            border-radius: 2px;
            animation: none;
        }

        .music-btn.playing .music-bars span {
            animation: barBounce 0.6s ease-in-out infinite alternate;
        }

        .music-bars span:nth-child(1) { animation-delay: 0s; height: 8px; }
        .music-bars span:nth-child(2) { animation-delay: 0.1s; height: 14px; }
        .music-bars span:nth-child(3) { animation-delay: 0.2s; height: 10px; }
        .music-bars span:nth-child(4) { animation-delay: 0.3s; height: 16px; }

        @keyframes barBounce {
            from { height: 4px; }
            to { height: 18px; }
        }

        .music-btn:not(.playing) .music-bars span {
            height: 4px !important;
            opacity: 0.3;
            animation: none !important;
        }

        /* ====== Hero Section ====== */
        .hero {
            text-align: center;
            margin-bottom: 60px;
            max-width: 800px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            background: rgba(0, 240, 255, 0.05);
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            color: var(--neon-cyan);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.4s forwards;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.6s forwards;
        }

        .hero-title .line1 {
            display: block;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-title .line2 {
            display: block;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 50%, var(--neon-magenta) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 4s linear infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.8;
            max-width: 550px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeInUp 1s ease 0.8s forwards;
        }

        .hero-subtitle .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--neon-cyan);
            margin-left: 3px;
            vertical-align: text-bottom;
            animation: cursorBlink 1s step-end infinite;
        }

        @keyframes cursorBlink {
            50% { opacity: 0; }
        }

        /* ====== Section Label ====== */
        .section-label {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1s forwards;
        }

        .section-label-inner {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .section-label h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--card-border), transparent);
        }

        /* ====== Cards Grid ====== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeInUp 1s ease 1.2s forwards;
        }

        .nav-card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 32px;
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            cursor: pointer;
        }

        /* Card top accent line */
        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 32px;
            right: 32px;
            height: 2px;
            border-radius: 0 0 2px 2px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .nav-card:hover::before {
            opacity: 1;
        }

        /* Card corner glow */
        .nav-card::after {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 24px;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .nav-card:hover::after {
            opacity: 1;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            border-color: transparent;
        }

        /* Card-specific colors */
        .nav-card[data-color="cyan"]::before { background: linear-gradient(90deg, var(--neon-cyan), transparent); }
        .nav-card[data-color="cyan"]:hover::after { background: radial-gradient(ellipse at top left, rgba(0,240,255,0.15), transparent 60%); }
        .nav-card[data-color="cyan"]:hover { box-shadow: 0 20px 60px rgba(0,240,255,0.15), inset 0 0 60px rgba(0,240,255,0.03); }

        .nav-card[data-color="magenta"]::before { background: linear-gradient(90deg, var(--neon-magenta), transparent); }
        .nav-card[data-color="magenta"]:hover::after { background: radial-gradient(ellipse at top left, rgba(255,0,170,0.15), transparent 60%); }
        .nav-card[data-color="magenta"]:hover { box-shadow: 0 20px 60px rgba(255,0,170,0.15), inset 0 0 60px rgba(255,0,170,0.03); }

        .nav-card[data-color="purple"]::before { background: linear-gradient(90deg, var(--neon-purple), transparent); }
        .nav-card[data-color="purple"]:hover::after { background: radial-gradient(ellipse at top left, rgba(168,85,247,0.15), transparent 60%); }
        .nav-card[data-color="purple"]:hover { box-shadow: 0 20px 60px rgba(168,85,247,0.15), inset 0 0 60px rgba(168,85,247,0.03); }

        .nav-card[data-color="green"]::before { background: linear-gradient(90deg, var(--neon-green), transparent); }
        .nav-card[data-color="green"]:hover::after { background: radial-gradient(ellipse at top left, rgba(16,185,129,0.15), transparent 60%); }
        .nav-card[data-color="green"]:hover { box-shadow: 0 20px 60px rgba(16,185,129,0.15), inset 0 0 60px rgba(16,185,129,0.03); }

        .nav-card[data-color="orange"]::before { background: linear-gradient(90deg, var(--neon-orange), transparent); }
        .nav-card[data-color="orange"]:hover::after { background: radial-gradient(ellipse at top left, rgba(249,115,22,0.15), transparent 60%); }
        .nav-card[data-color="orange"]:hover { box-shadow: 0 20px 60px rgba(249,115,22,0.15), inset 0 0 60px rgba(249,115,22,0.03); }

        .card-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: all 0.4s ease;
        }

        .nav-card:hover .card-icon {
            transform: scale(1.1) rotate(-3deg);
        }

        .nav-card[data-color="cyan"] .card-icon {
            background: rgba(0,240,255,0.1);
            border: 1px solid rgba(0,240,255,0.15);
        }
        .nav-card[data-color="magenta"] .card-icon {
            background: rgba(255,0,170,0.1);
            border: 1px solid rgba(255,0,170,0.15);
        }
        .nav-card[data-color="purple"] .card-icon {
            background: rgba(168,85,247,0.1);
            border: 1px solid rgba(168,85,247,0.15);
        }
        .nav-card[data-color="green"] .card-icon {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.15);
        }
        .nav-card[data-color="orange"] .card-icon {
            background: rgba(249,115,22,0.1);
            border: 1px solid rgba(249,115,22,0.15);
        }

        .card-number {
            font-family: 'Orbitron', monospace;
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .nav-card[data-color="cyan"]:hover .card-title { color: var(--neon-cyan); }
        .nav-card[data-color="magenta"]:hover .card-title { color: var(--neon-magenta); }
        .nav-card[data-color="purple"]:hover .card-title { color: var(--neon-purple); }
        .nav-card[data-color="green"]:hover .card-title { color: var(--neon-green); }
        .nav-card[data-color="orange"]:hover .card-title { color: var(--neon-orange); }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .card-tag {
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .card-arrow {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateX(-10px);
        }

        .nav-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .nav-card[data-color="cyan"]:hover .card-arrow { border-color: rgba(0,240,255,0.3); color: var(--neon-cyan); background: rgba(0,240,255,0.1); }
        .nav-card[data-color="magenta"]:hover .card-arrow { border-color: rgba(255,0,170,0.3); color: var(--neon-magenta); background: rgba(255,0,170,0.1); }
        .nav-card[data-color="purple"]:hover .card-arrow { border-color: rgba(168,85,247,0.3); color: var(--neon-purple); background: rgba(168,85,247,0.1); }
        .nav-card[data-color="green"]:hover .card-arrow { border-color: rgba(16,185,129,0.3); color: var(--neon-green); background: rgba(16,185,129,0.1); }
        .nav-card[data-color="orange"]:hover .card-arrow { border-color: rgba(249,115,22,0.3); color: var(--neon-orange); background: rgba(249,115,22,0.1); }

        /* ====== Featured Card (first card wider on large screens) ====== */
        @media (min-width: 900px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .cards-grid .nav-card:nth-child(1) {
                grid-column: span 1;
            }
        }

        /* ====== Footer ====== */
        .site-footer {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            padding: 40px 20px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1.4s forwards;
        }

        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
        }

        .footer-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--neon-cyan);
        }

        /* ====== Animations ====== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ====== Responsive ====== */
        @media (max-width: 768px) {
            .main-container {
                padding: 40px 16px 30px;
            }

            .hero {
                margin-bottom: 40px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .nav-card {
                padding: 28px 24px;
            }

            .card-icon {
                width: 56px;
                height: 56px;
                font-size: 1.6rem;
            }

            .status-bar {
                padding: 12px 0;
            }

            .section-label-inner {
                gap: 12px;
            }

            .section-label h2 {
                font-size: 0.75rem;
                letter-spacing: 2px;
            }
        }

        @media (max-width: 400px) {
            .hero-title {
                font-size: 2rem;
            }

            .hero-badge {
                font-size: 0.6rem;
                padding: 6px 14px;
            }

            .nav-card {
                padding: 24px 20px;
                border-radius: 20px;
            }
        }

        /* ====== Reduced Motion ====== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- Ambient glow -->
    <div class="ambient-glow glow-top-left"></div>
    <div class="ambient-glow glow-bottom-right"></div>
    <div class="ambient-glow glow-center"></div>

    <!-- Scanline overlay -->
    <div class="scanlines"></div>

    <!-- Main content -->
    <div class="main-container">

        <!-- Status bar -->
        <div class="status-bar">
            <div class="status-left">
                <div class="status-dot"></div>
                <span class="status-text">System Online</span>
            </div>
            <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="背景音樂">
                <div class="music-bars">
                    <span></span><span></span><span></span><span></span>
                </div>
            </button>
        </div>

        <!-- Hero -->
        <div class="hero">
            <div class="hero-badge">
                <span>⚡</span>
                <span>Welcome to my universe</span>
            </div>
            <h1 class="hero-title">
                <span class="line1">🦐 小蝦的</span>
                <span class="line2">網頁世界</span>
            </h1>
            <p class="hero-subtitle">
                欢迎来到我的世界——探索卡片，发现惊喜<span class="cursor"></span>
            </p>
        </div>

        <!-- Section label -->
        <div class="section-label">
            <div class="section-label-inner">
                <h2>导航导航 Navigation</h2>
                <div class="section-line"></div>
            </div>
        </div>

        <!-- Cards -->
        <div class="cards-grid">
            <a href="date.html" class="nav-card" data-color="cyan">
                <div class="card-icon">💌</div>
                <span class="card-number">01</span>
                <h3 class="card-title">約會邀請</h3>
                <p class="card-desc">一個重要的邀請，等你來開啟</p>
                <div class="card-footer">
                    <span class="card-tag">Special</span>
                    <span class="card-arrow">→</span>
                </div>
            </a>

            <a href="space.html" class="nav-card" data-color="magenta">
                <div class="card-icon">🚀</div>
                <span class="card-number">02</span>
                <h3 class="card-title">星戰異星戰機</h3>
                <p class="card-desc">星際射擊小遊戲，準備出擊</p>
                <div class="card-footer">
                    <span class="card-tag">Game</span>
                    <span class="card-arrow">→</span>
                </div>
            </a>

            <a href="takoyaki.html" class="nav-card" data-color="purple">
                <div class="card-icon">🐙</div>
                <span class="card-number">03</span>
                <h3 class="card-title">瘋狂章魚燒</h3>

                <div class="card-icon">🐾</div>

                <p class="card-desc">留下你的足跡，分享你的故事</p>

            <a href="videos.html" class="nav-card" data-color="orange">
                <div class="card-icon">🎬</div>
                <span class="card-number">05</span>
                <h3 class="card-title">影片區</h3>
                <p class="card-desc">AI 生成影像作品集展示</p>
                <div class="card-footer">
                    <span class="card-tag">Media</span>
                    <span class="card-arrow">→</span>

        <!-- Footer -->
        <div class="site-footer">
            <div class="footer-inner">
                <span class="footer-dot"></span>

                <span class="footer-dot"></span>
            </div>
        </div>
    </div>

    <script>
    // ===== 科技感背景音樂 (Web Audio API) =====
    let musicCtx = null;
    let musicPlaying = false;
    let musicLoopId = null;

    function playTechLoop() {
        if (!musicPlaying) return;
        const ctx = musicCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (!musicCtx) musicCtx = ctx;
        const now = ctx.currentTime;
        const duration = 15;
        const master = ctx.createGain();
        master.gain.value = 0.10;
        master.connect(ctx.destination);

        // 深低音
        const sub = ctx.createOscillator();
        sub.type = 'sine';
        sub.frequency.value = 55;
        const subG = ctx.createGain();
        subG.gain.setValueAtTime(0.5, now);
        subG.gain.linearRampToValueAtTime(0, now + duration);
        sub.connect(subG).connect(master);
        sub.start(now);
        sub.stop(now + duration);

        // 脈衝合成
        for (let i = 0; i < 16; i++) {
            const t = now + i * (duration / 16);
            const osc = ctx.createOscillator();
            osc.type = 'square';
            osc.frequency.value = 60 + Math.random() * 40;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.10, t + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            osc.connect(g).connect(master);
            osc.start(t);
            osc.stop(t + 0.35);
        }

        // 琶音
        const notes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 261.63, 196.00];
        const step = duration / (notes.length * 2);
        notes.forEach((freq, i) => {
            notes.forEach((f, j) => {
                const t = now + i * step + j * step * 0.5;
                if (t >= now + duration) return;
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.value = f * 2;
                const g = ctx.createGain();
                g.gain.setValueAtTime(0, t);
                g.gain.linearRampToValueAtTime(0.025, t + 0.01);
                g.gain.exponentialRampToValueAtTime(0.001, t + step * 0.45);
                osc.connect(g).connect(master);
                osc.start(t);
                osc.stop(t + step * 0.5);
            });
        });

        // Pad
        const pad = ctx.createOscillator();
        pad.type = 'triangle';
        pad.frequency.value = 130.81;
        const padG = ctx.createGain();
        padG.gain.setValueAtTime(0, now);
        padG.gain.linearRampToValueAtTime(0.05, now + 2);
        padG.gain.setValueAtTime(0.05, now + duration - 3);
        padG.gain.linearRampToValueAtTime(0, now + duration);
        const lfo = ctx.createOscillator();
        lfo.frequency.value = 0.3;
        const lfoG = ctx.createGain();
        lfoG.gain.value = 50;
        lfo.connect(lfoG).connect(pad.frequency);
        pad.connect(padG).connect(master);
        pad.start(now);
        pad.stop(now + duration);
        lfo.start(now);
        lfo.stop(now + duration);

        musicLoopId = setTimeout(playTechLoop, duration * 1000);
    }

    function toggleMusic() {
        const btn = document.getElementById('musicBtn');
        if (!musicPlaying) {
            if (!musicCtx) musicCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (musicCtx.state === 'suspended') musicCtx.resume();
            musicPlaying = true;
            btn.classList.add('playing');
            playTechLoop();
        } else {
            musicPlaying = false;
            if (musicCtx) musicCtx.suspend();
            clearTimeout(musicLoopId);
            btn.classList.remove('playing');
        }
    }

    // 首次點擊啟動音樂
    document.addEventListener('click', function initMusic() {
        if (!musicPlaying) {
            toggleMusic();
            const hint = document.createElement('div');
            hint.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,240,255,0.1);backdrop-filter:blur(20px);border:1px solid rgba(0,240,255,0.3);color:var(--neon-cyan);padding:16px 32px;border-radius:16px;font-size:0.9rem;z-index:200;animation:hintFade 2.5s ease forwards;pointer-events:none;font-family:Orbitron,monospace;letter-spacing:2px;';
            hint.textContent = '🎵 MUSIC STARTED';
            document.body.appendChild(hint);
            setTimeout(() => hint.remove(), 2500);
        }
        document.removeEventListener('click', initMusic);
    });

    // ===== 粒子背景 =====
    const canvas = document.getElementById('bg-canvas');
    const pCtx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
    });

    const PARTICLE_COLORS = [
        'rgba(0,240,255,',
        'rgba(255,0,170,',
        'rgba(168,85,247,',
        'rgba(59,130,246,',
        'rgba(249,115,22,'
    ];

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.5;
            this.speedY = (Math.random() - 0.5) * 0.5;
            this.opacity = Math.random() * 0.4 + 0.1;
            this.colorBase = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;

            if (mouse.x !== null) {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    this.x -= dx * 0.015;
                    this.y -= dy * 0.015;
                }
            }
        }

        draw() {
            pCtx.beginPath();
            pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            pCtx.fillStyle = this.colorBase + this.opacity + ')';
            pCtx.fill();
        }
    }

    for (let i = 0; i < 80; i++) {
        particles.push(new Particle());
    }

    function connectParticles() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    const alpha = 0.06 * (1 - dist / 120);
                    pCtx.beginPath();
                    pCtx.strokeStyle = `rgba(0,240,255,${alpha})`;
                    pCtx.lineWidth = 0.5;
                    pCtx.moveTo(particles[i].x, particles[i].y);
                    pCtx.lineTo(particles[j].x, particles[j].y);
                    pCtx.stroke();
                }
            }
        }
    }

    function animate() {
        pCtx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        connectParticles();
        requestAnimationFrame(animate);
    }
    animate();

    // ===== 卡片進入動畫 (Intersection Observer) =====
    if ('IntersectionObserver' in window) {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.nav-card').forEach((card, i) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(40px)';
            card.style.transition = `all 0.6s cubic-bezier(0.23, 1, 0.32, 1) ${i * 0.1}s`;
            observer.observe(card);
        });
    }
    </script>
