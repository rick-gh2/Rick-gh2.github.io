<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小蝦空戰 🛩️ 橫版捲軸空戰</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0a0a2e;
            overflow:hidden;
            font-family:'Noto Sans TC',Arial,sans-serif;
            touch-action:none;
        }
        canvas { display:block; }

        /* ===== UI 層 ===== */
        #ui {
            position:absolute; top:12px; left:14px;
            color:#fff; font-size:1rem; z-index:10;
            text-shadow:1px 1px 4px rgba(0,0,0,0.9);
            pointer-events:none;
        }
        .ui-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .score { font-size:1.6rem; font-weight:900; color:#feca57; }
        .lives { font-size:1.4rem; }
        .combo-text { font-size:0.9rem; color:#48dbfb; font-weight:700; }

        /* 能量條 */
        .energy-bar-wrap {
            position:absolute; top:12px; right:14px; z-index:10;
            width:120px; pointer-events:none;
        }
        .energy-label { font-size:0.75rem; color:#a29bfe; margin-bottom:3px; }
        .energy-bar-bg {
            width:100%; height:8px; background:rgba(255,255,255,0.15);
            border-radius:4px; overflow:hidden;
        }
        .energy-bar {
            height:100%; width:0%; border-radius:4px;
            background:linear-gradient(90deg,#6c5ce7,#a29bfe);
            transition:width 0.2s;
        }

        /* ===== 按鈕 ===== */
        #startBtn, #restartBtn {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            padding:20px 56px; font-size:1.6rem; font-family:'Noto Sans TC',sans-serif;
            font-weight:bold; border:none; border-radius:20px;
            cursor:pointer; z-index:20;
            background:linear-gradient(135deg,#48dbfb,#0abde3);
            color:white;
            box-shadow:0 8px 30px rgba(72,219,251,0.4);
            animation:btnPulse 1.5s ease-in-out infinite;
            transition:transform 0.2s;
        }
        #startBtn:hover, #restartBtn:hover { transform:translate(-50%,-50%) scale(1.05); }
        @keyframes btnPulse {
            0%,100%{box-shadow:0 8px 30px rgba(72,219,251,0.4)}
            50%{box-shadow:0 8px 40px rgba(72,219,251,0.7)}
        }

        /* ===== Game Over ===== */
        #gameOver {
            display:none; position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            text-align:center; color:white; z-index:20;
            background:rgba(10,10,46,0.92); padding:36px 42px;
            border-radius:24px; border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 20px 60px rgba(0,0,0,0.6);
            animation:overlayIn 0.4s ease;
        }
        @keyframes overlayIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.85)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
        #gameOver h2 { font-size:2rem; color:#ff6b6b; margin-bottom:10px; }
        #gameOver .final-score { font-size:2.4rem; font-weight:900; color:#feca57; margin:8px 0; }
        #restartBtn {
            margin-top:16px; padding:14px 40px; font-size:1.2rem;
            border:none; border-radius:14px;
            background:linear-gradient(135deg,#48dbfb,#0abde3);
            color:white; cursor:pointer; font-weight:700;
            box-shadow:0 5px 20px rgba(72,219,251,0.3);
            transition:transform 0.2s;
        }
        #restartBtn:hover { transform:translateY(-2px); }
        .back-link {
            display:inline-block; margin-top:14px;
            color:rgba(255,255,255,0.5); text-decoration:none;
            font-size:0.9rem;
        }
        .back-link:hover { color:rgba(255,255,255,0.8); }

        /* ===== 手機控制 ===== */
        #controls {
            position:absolute; bottom:20px; left:0; width:100%;
            display:flex; justify-content:space-between; padding:0 20px;
            z-index:10; pointer-events:none;
        }
        .ctrl-btn {
            width:72px; height:72px; border-radius:50%;
            background:rgba(255,255,255,0.15);
            border:2px solid rgba(255,255,255,0.3);
            color:white; font-size:1.6rem; display:flex; align-items:center;
            justify-content:center; pointer-events:auto; user-select:none;
            transition:background 0.15s;
        }
        .ctrl-btn:active { background:rgba(255,255,255,0.35); }
        .fire-btn {
            width:96px; height:96px; font-size:2.2rem;
            background:rgba(255,71,87,0.25); border-color:rgba(255,71,87,0.5);
        }
        .fire-btn:active { background:rgba(255,71,87,0.5); }

        @media(max-width:600px){
            .score { font-size:1.3rem; }
            .energy-bar-wrap { width:90px; }
            #startBtn { padding:16px 40px; font-size:1.3rem; }
            .ctrl-btn { width:62px; height:62px; font-size:1.4rem; }
            .fire-btn { width:80px; height:80px; font-size:1.8rem; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <div id="ui">
        <div class="ui-row"><span class="score">分數：<span id="score">0</span></span></div>
        <div class="ui-row"><span class="lives" id="lives">❤️❤️❤️</span></div>
        <div class="ui-row"><span class="combo-text" id="comboDisplay"></span></div>
    </div>
    <div class="energy-bar-wrap">
        <div class="energy-label">⚡ 特殊武器</div>
        <div class="energy-bar-bg"><div class="energy-bar" id="energyBar"></div></div>
    </div>

    <button id="startBtn">🛩️ 開始空戰</button>

    <div id="gameOver">
        <h2>💥 飛機墜毀！</h2>
        <div class="final-score" id="finalScore">0</div>
        <button id="restartBtn">🔄 再玩一次</button>
        <br>
        <a href="index.html" class="back-link">← 回首頁</a>
    </div>

    <div id="controls" style="display:none;">
        <div style="display:flex;gap:10px;">
            <button class="ctrl-btn" id="leftBtn">◀</button>
            <button class="ctrl-btn" id="rightBtn">▶</button>
        </div>
        <div style="display:flex;gap:10px;">
            <button class="ctrl-btn fire-btn" id="fireBtn">🔥</button>
            <button class="ctrl-btn" id="bombBtn" style="font-size:1.4rem;background:rgba(108,92,231,0.25);border-color:rgba(108,92,231,0.5);">💣</button>
        </div>
    </div>

    <script>
    const canvas=document.getElementById('game');
    const ctx=canvas.getContext('2d');

    function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
    resize();
    window.addEventListener('resize',resize);

    // ===== 音效 (Web Audio API) =====
    let audioCtx;
    function initAudio(){
        if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    }
    function playSound(freq,dur,type='square',vol=0.12){
        if(!audioCtx)return;
        try{
            const o=audioCtx.createOscillator(),g=audioCtx.createGain();
            o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);
            g.gain.setValueAtTime(vol,audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
            o.connect(g);g.connect(audioCtx.destination);
            o.start();o.stop(audioCtx.currentTime+dur);
        }catch(e){}
    }

    // ===== 遊戲狀態 =====
    let gameRunning=false, score=0, lives=3, scrollSpeed=2;
    let lastEnemyTime=0, energy=0, energyMax=100;
    let stars=[], clouds=[], mountains=[];
    let powerups=[], explosions=[], screenShake=0;
    let playerCombo=0, comboTimer=null;

    // 玩家
    const player={x:80,y:0,w:50,h:50,speed:5, dx:0,fireRate:180,lastFire:0,trail:[]};

    let bullets=[], enemies=[], enemyBullets=[], powerupBullets=[];

    // 星空背景
    for(let i=0;i<200;i++){
        stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2.5+0.5,speed:Math.random()*2.5+0.5,brightness:Math.random()});
    }
    for(let i=0;i<10;i++){
        clouds.push({x:Math.random()*canvas.width*2,y:Math.random()*canvas.height*0.55,w:Math.random()*120+60,h:Math.random()*35+20});
    }
    for(let i=0;i<25;i++){
        mountains.push({x:i*130,y:canvas.height-Math.random()*180-40,w:Math.random()*90+60,h:Math.random()*120+60});
    }

    // ===== 繪製飛機 =====
    function drawPlane(x,y,scale=1,color='#48dbfb',tilt=0){
        ctx.save();
        ctx.translate(x,y);
        ctx.scale(scale,scale);
        ctx.rotate(tilt*0.08);

        // 引擎尾焰
        const flameLen=12+Math.random()*10;
        const flameGrad=ctx.createLinearGradient(-22,0,-22-flameLen,0);
        flameGrad.addColorStop(0,'#feca57');
        flameGrad.addColorStop(0.4,'#ff9f43');
        flameGrad.addColorStop(1,'rgba(255,159,67,0)');
        ctx.fillStyle=flameGrad;
        ctx.beginPath();
        ctx.moveTo(-20,0);
        ctx.lineTo(-22-flameLen,-5);
        ctx.lineTo(-22-flameLen,5);
        ctx.closePath();
        ctx.fill();

        // 機身
        ctx.fillStyle=color;
        ctx.beginPath();
        ctx.moveTo(28,0);
        ctx.lineTo(-18,-14);
        ctx.lineTo(-22,0);
        ctx.lineTo(-18,14);
        ctx.closePath();
        ctx.fill();

        // 機翼
        ctx.fillStyle='#0abde3';
        ctx.beginPath();
        ctx.moveTo(8,0);
        ctx.lineTo(-12,-28);
        ctx.lineTo(-17,-28);
        ctx.lineTo(-8,0);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(8,0);
        ctx.lineTo(-12,28);
        ctx.lineTo(-17,28);
        ctx.lineTo(-8,0);
        ctx.closePath();
        ctx.fill();

        // 尾翼
        ctx.fillStyle='#2e86de';
        ctx.beginPath();
        ctx.moveTo(-18,0);
        ctx.lineTo(-28,-12);
        ctx.lineTo(-25,0);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-18,0);
        ctx.lineTo(-28,12);
        ctx.lineTo(-25,0);
        ctx.closePath();
        ctx.fill();

        // 駕駛艙
        ctx.fillStyle='rgba(162,155,254,0.7)';
        ctx.beginPath();
        ctx.ellipse(5,-2,6,4,0,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }

    // 敵人
    function drawEnemy(e){
        ctx.save();
        ctx.translate(e.x,e.y);
        ctx.scale(-1,1);
        if(e.type==='boss'){
            ctx.scale(1.4,1.4);
        }
        // 敵機主體
        ctx.fillStyle=e.hp>2?'#e74c3c':'#c0392b';
        ctx.beginPath();
        ctx.moveTo(22,0);
        ctx.lineTo(-12,-12);
        ctx.lineTo(-18,0);
        ctx.lineTo(-12,12);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle='#a93226';
        ctx.beginPath();
        ctx.moveTo(6,0);
        ctx.lineTo(-10,-22);
        ctx.lineTo(-14,-22);
        ctx.lineTo(-6,0);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(6,0);
        ctx.lineTo(-10,22);
        ctx.lineTo(-14,22);
        ctx.lineTo(-6,0);
        ctx.closePath();
        ctx.fill();
        // 紅眼
        ctx.fillStyle='#ff6b6b';
        ctx.shadowColor='#ff0000';
        ctx.shadowBlur=8;
        ctx.beginPath();
        ctx.arc(10,0,3,0,Math.PI*2);
        ctx.fill();
        ctx.shadowBlur=0;
        ctx.restore();
    }

    // 爆炸
    function createExplosion(x,y,size=1){
        playSound(150+Math.random()*100,0.3,'sawtooth',0.08);
        for(let i=0;i<Math.floor(18*size);i++){
            const angle=Math.random()*Math.PI*2;
            const vel=(Math.random()*6+3)*size;
            explosions.push({
                x,y,
                vx:Math.cos(angle)*vel,
                vy:Math.sin(angle)*vel,
                life:25+Math.random()*15,
                maxLife:40,
                size:Math.random()*7+3,
                color:Math.random()>0.5?'#ff6b6b':'#feca57'
            });
        }
        screenShake=6*size;
    }

    // 更新玩家
    function updatePlayer(){
        const targetY=canvas.height/2;
        // 平滑移動
        player.y+=(targetY-player.y)*0.15;
        player.x+=player.dx*player.speed;
        player.x=Math.max(player.w/2,Math.min(canvas.width-player.w/2,player.x));

        // 尾焰粒子
        player.trail.push({x:player.x-28,y:player.y+Math.random()*6-3,life:15});
        if(player.trail.length>20)player.trail.shift();

        // 飛機傾斜
        const tilt=player.dx;
    }

    // 射擊
    function shoot(){
        const now=Date.now();
        if(now-player.lastFire<player.fireRate)return;
        player.lastFire=now;
        playSound(800,0.08,'square',0.06);
        // 雙向子彈
        bullets.push({x:player.x+28,y:player.y-10,w:6,h:14,speed:10,dmg:1});
        bullets.push({x:player.x+28,y:player.y+10,w:6,h:14,speed:10,dmg:1});
    }

    // 特殊武器
    function useBomb(){
        if(energy<energyMax)return;
        energy=0;
        updateEnergyBar();
        playSound(200,0.5,'sine',0.15);
        // 全屏爆炸
        enemies.forEach(e=>{
            createExplosion(e.x,e.y,1.5);
            score+=20;
        });
        enemies=[];
        enemyBullets=[];
        screenShake=15;
        document.getElementById('score').textContent=score;
    }

    // 生成敵人
    function spawnEnemy(now){
        const interval=Math.max(500,1200-score/5);
        if(now-lastEnemyTime<interval)return;
        lastEnemyTime=now;

        const roll=Math.random();
        let e;
        if(score>500&&roll<0.05){
            // Boss
            e={x:canvas.width+50,y:canvas.height/2,w:60,h:60,speed:1.2,hp:8,maxHp:8,type:'boss'};
        }else if(roll<0.4){
            e={x:canvas.width+30,y:Math.random()*(canvas.height-120)+60,w:30,h:30,speed:2.5+Math.random()*2,hp:1,type:'normal'};
        }else if(roll<0.7){
            e={x:canvas.width+45,y:Math.random()*(canvas.height-160)+80,w:45,h:45,speed:1.8+Math.random()*1.2,hp:3,type:'heavy'};
        }else{
            // 快速型
            e={x:canvas.width+25,y:Math.random()*(canvas.height-100)+50,w:25,h:25,speed:4+Math.random()*2,hp:1,type:'fast'};
        }
        enemies.push(e);
    }

    // 碰撞
    function checkCollisions(){
        // 子彈打敵人
        for(let bi=bullets.length-1;bi>=0;bi--){
            const b=bullets[bi];
            if(!b)continue;
            for(let ei=enemies.length-1;ei>=0;ei--){
                const e=enemies[ei];
                if(Math.abs(b.x-e.x)<(e.w/2+b.w/2)&&Math.abs(b.y-e.y)<(e.h/2+b.h/2)){
                    e.hp-=b.dmg||1;
                    bullets.splice(bi,1);
                    // 命中火花
                    for(let i=0;i<4;i++){
                        explosions.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:8,maxLife:8,size:3,color:'#48dbfb'});
                    }
                    if(e.hp<=0){
                        createExplosion(e.x,e.y,e.type==='boss'?2:1);
                        enemies.splice(ei,1);
                        score+=e.type==='boss'?200:e.type==='heavy'?50:e.type==='fast'?15:10;
                        energy=Math.min(energyMax,energy+e.type==='boss'?50:e.type==='heavy'?15:5);
                        updateEnergyBar();
                    }
                    break;
                }
            }
        }

        // 敵人撞玩家
        for(let ei=enemies.length-1;ei>=0;ei--){
            const e=enemies[ei];
            if(Math.abs(player.x-e.x)<(e.w/2+15)&&Math.abs(player.y-e.y)<(e.h/2+12)){
                createExplosion(e.x,e.y,1.2);
                enemies.splice(ei,1);
                hitPlayer();
            }
        }

        // 子彈撞玩家
        for(let bi=enemyBullets.length-1;bi>=0;bi--){
            const b=enemyBullets[bi];
            if(Math.abs(player.x-b.x)<18&&Math.abs(player.y-b.y)<18){
                createExplosion(b.x,b.y,0.5);
                enemyBullets.splice(bi,1);
                hitPlayer();
            }
        }
    }

    function hitPlayer(){
        lives--;
        playerCombo=0;
        clearTimeout(comboTimer);
        updateLives();
        playSound(100,0.4,'sawtooth',0.1);
        screenShake=10;
        if(lives<=0)endGame();
    }

    function updateLives(){
        document.getElementById('lives').textContent='❤️'.repeat(Math.max(0,lives));
    }
    function updateEnergyBar(){
        document.getElementById('energyBar').style.width=(energy/energyMax*100)+'%';
    }

    // ===== 更新 =====
    function update(){
        if(!gameRunning)return;

        updatePlayer();

        // 子彈
        bullets=bullets.filter(b=>{b.x+=b.speed;return b.x<canvas.width+20;});

        // 敵人
        enemies=enemies.filter(e=>{
            e.x-=e.speed;
            // Boss 會射擊
            if(e.type==='boss'&&Math.random()<0.015){
                enemyBullets.push({x:e.x-30,y:e.y,speed:4});
            }
            return e.x>-80;
        });

        // 敵人子彈
        enemyBullets=enemyBullets.filter(b=>{b.x-=b.speed;return b.x>-10;});

        // 碰撞
        checkCollisions();

        // 爆炸
        explosions=explosions.filter(p=>{
            p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;p.life--;
            return p.life>0;
        });

        // 玩家尾焰
        player.trail=player.trail.filter(t=>{t.life--;return t.life>0;});

        // 星空
        stars.forEach(s=>{s.x-=s.speed;if(s.x<0){s.x=canvas.width;s.y=Math.random()*canvas.height;}});

        // 雲
        clouds.forEach(c=>{c.x-=scrollSpeed*0.4;if(c.x<-c.w){c.x=canvas.width+50;}});

        // 山
        mountains.forEach(m=>{m.x-=scrollSpeed*0.7;if(m.x<-m.w){m.x=canvas.width+m.w+Math.random()*200;}});

        // Combo
        if(score%10===0&&gameRunning){
            playerCombo++;
            comboTimer=setTimeout(()=>{playerCombo=0;document.getElementById('comboDisplay').textContent='';},1500);
            if(playerCombo>=3) document.getElementById('comboDisplay').textContent='🔥 '+playerCombo+'x COMBO!';
        }

        // 分數&速度
        score++;
        if(score%100===0)scrollSpeed+=0.15;
        document.getElementById('score').textContent=score;
    }

    // ===== 繪製 =====
    function draw(){
        // 屏幕震動
        if(screenShake>0){
            ctx.save();
            ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
            screenShake*=0.85;if(screenShake<0.5)screenShake=0;
        }

        // 天空
        const grad=ctx.createLinearGradient(0,0,0,canvas.height);
        grad.addColorStop(0,'#0a0a2e');
        grad.addColorStop(0.5,'#1a1a4e');
        grad.addColorStop(1,'#2d3436');
        ctx.fillStyle=grad;
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // 星星
        stars.forEach(s=>{
            const b=s.brightness*(0.7+Math.sin(Date.now()*0.003+s.x)*0.3);
            ctx.fillStyle=`rgba(255,255,255,${b})`;
            ctx.fillRect(s.x,s.y,s.s,s.s);
        });

        // 雲
        clouds.forEach(c=>{
            ctx.fillStyle='rgba(255,255,255,0.04)';
            ctx.beginPath();
            ctx.ellipse(c.x,c.y,c.w,c.h,0,0,Math.PI*2);
            ctx.fill();
        });

        // 山
        mountains.forEach(m=>{
            ctx.fillStyle='rgba(0,0,0,0.15)';
            ctx.beginPath();
            ctx.moveTo(m.x,m.y+m.h);
            ctx.lineTo(m.x+m.w/2,m.y);
            ctx.lineTo(m.x+m.w,m.y+m.h);
            ctx.closePath();
            ctx.fill();
        });

        // 玩家尾焰
        player.trail.forEach(t=>{
            const a=t.life/15;
            ctx.fillStyle=`rgba(254,202,87,${a*0.3})`;
            ctx.beginPath();
            ctx.arc(t.x,t.y,4*a,0,Math.PI*2);
            ctx.fill();
        });

        // 敵人
        enemies.forEach(e=>drawEnemy(e));

        // 子彈
        ctx.shadowColor='#feca57';
        ctx.shadowBlur=12;
        ctx.fillStyle='#feca57';
        bullets.forEach(b=>ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h));
        ctx.shadowBlur=0;

        // 敵人子彈
        ctx.shadowColor='#e74c3c';
        ctx.shadowBlur=8;
        ctx.fillStyle='#ff6b6b';
        enemyBullets.forEach(b=>{
            ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();
        });
        ctx.shadowBlur=0;

        // 玩家飛機
        const tilt=player.dx;
        drawPlane(player.x,player.y,1,'#48dbfb',tilt);

        // 爆炸
        explosions.forEach(p=>{
            const a=p.life/p.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=p.color;
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha=1;

        if(screenShake>0)ctx.restore();
    }

    // ===== Game Over =====
    function endGame(){
        gameRunning=false;
        document.getElementById('finalScore').textContent=score;
        document.getElementById('gameOver').style.display='block';
        document.getElementById('controls').style.display='none';
    }

    // ===== 遊戲循環 =====
    function gameLoop(){
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // ===== 按鈕事件 =====
    function resetGameState(){
        score=0;lives=3;scrollSpeed=2;player.dx=0;playerCombo=0;energy=0;
        bullets=[];enemies=[];enemyBullets=[];explosions=[];screenShake=0;
        player.x=80;player.y=canvas.height/2;
        document.getElementById('score').textContent='0';
        updateLives();updateEnergyBar();
        document.getElementById('comboDisplay').textContent='';
    }

    document.getElementById('startBtn').addEventListener('click',()=>{
        initAudio();
        document.getElementById('startBtn').style.display='none';
        document.getElementById('controls').style.display='flex';
        resetGameState();
        gameRunning=true;
    });

    document.getElementById('restartBtn').addEventListener('click',()=>{
        document.getElementById('gameOver').style.display='none';
        document.getElementById('controls').style.display='flex';
        resetGameState();
        gameRunning=true;
    });

    // 鍵盤
    document.addEventListener('keydown',e=>{
        if(e.key==='ArrowUp'||e.key==='w')player.dy=-1;
        if(e.key==='ArrowDown'||e.key==='s')player.dy=1;
        if(e.key==='ArrowLeft'||e.key==='a')player.dx=-1;
        if(e.key==='ArrowRight'||e.key==='d')player.dx=1;
        if(e.key===' ')shoot();
        if(e.key==='b')useBomb();
    });
    document.addEventListener('keyup',e=>{
        if(['ArrowUp','ArrowDown','w','s'].includes(e.key))player.dy=0;
        if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))player.dx=0;
    });

    // 手機按鈕
    let touchDir={x:0,y:0};
    function setupBtn(id,dir){
        const btn=document.getElementById(id);
        const on=(e)=>{e.preventDefault();initAudio();if(dir==='left')touchDir.x=-1;if(dir==='right')touchDir.x=1;if(dir==='fire')shoot();if(dir==='bomb')useBomb();};
        const off=(e)=>{e.preventDefault();if(dir==='left'&&touchDir.x===-1)touchDir.x=0;if(dir==='right'&&touchDir.x===1)touchDir.x=0;};
        btn.addEventListener('touchstart',on,{passive:false});
        btn.addEventListener('touchend',off,{passive:false});
        btn.addEventListener('mousedown',on);
        btn.addEventListener('mouseup',off);
        btn.addEventListener('mouseleave',off);
    }
    setupBtn('leftBtn','left');
    setupBtn('rightBtn','right');
    setupBtn('fireBtn','fire');
    setupBtn('bombBtn','bomb');

    // 滑鼠跟隨
    canvas.addEventListener('mousemove',e=>{if(gameRunning)player.y+=(e.clientY-player.y)*0.2;});

    gameLoop();
    </script>
</body>
</html>
