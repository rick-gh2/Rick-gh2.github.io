<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>星戰異星戰機 ✨ Star Strike</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #03030c; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: fixed; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; color: #fff; font-size: 16px; font-weight: bold; text-shadow: 0 0 8px #00f0ff; pointer-events: none; z-index: 10; gap: 8px; flex-wrap: wrap; }
        .ui-section { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(0,240,255,0.3); }
        .hp-bar-container, .xp-bar-container { width: 80px; height: 10px; background: rgba(255,255,255,0.15); border-radius: 5px; overflow: hidden; border: 1px solid rgba(0,240,255,0.4); }
        #hp-bar { height: 100%; background: linear-gradient(90deg, #ff0055, #00ff66); transition: width 0.15s ease; width: 100%; }
        #xp-bar { height: 100%; background: linear-gradient(90deg, #ff7700, #ffdd00); transition: width 0.15s ease; width: 0%; }
        .powerup-indicator { font-size: 20px; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,20,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; backdrop-filter: blur(5px); transition: opacity 0.3s ease; }
        .screen h1 { font-size: 30px; color: #00f0ff; text-shadow: 0 0 20px #00f0ff; margin-bottom: 5px; letter-spacing: 2px; }
        .screen h2 { font-size: 22px; color: #ff7700; text-shadow: 0 0 15px #ff7700; margin-bottom: 5px; }
        .screen .subtitle { font-size: 14px; color: #8fa0af; margin-bottom: 15px; }
        .screen p { color: #8fa0af; font-size: 14px; margin-bottom: 15px; text-align: center; padding: 0 20px; line-height: 1.6; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin: 10px 0; }
        .stat-item { background: rgba(0,240,255,0.1); padding: 8px 15px; border-radius: 10px; border: 1px solid rgba(0,240,255,0.2); }
        .stat-label { font-size: 11px; color: #6fa0af; }
        .stat-value { font-size: 18px; color: #00f0ff; font-weight: bold; }
        .btn { background: linear-gradient(45deg, #0055ff, #00f0ff); color: white; border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; border-radius: 25px; box-shadow: 0 0 15px #00f0ff; letter-spacing: 1px; cursor: pointer; margin: 5px; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px #00f0ff; }
        .btn:active { transform: scale(0.95); }
        .btn.secondary { background: linear-gradient(45deg, #333, #555); box-shadow: 0 0 10px rgba(255,255,255,0.2); font-size: 14px; padding: 8px 20px; }
        .btn.danger { background: linear-gradient(45deg, #ff0055, #ff7700); box-shadow: 0 0 15px #ff0055; }
        .powerups-list { display: flex; gap: 15px; font-size: 24px; margin: 10px 0; }
        .highscore-banner { background: linear-gradient(45deg, #ffdd00, #ff7700); color: #000; padding: 6px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 15px; animation: glow 1s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #ff7700; } to { box-shadow: 0 0 20px #ffdd00; } }
        #pause-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,20,0.7); justify-content: center; align-items: center; color: white; z-index: 90; flex-direction: column; font-size: 40px; backdrop-filter: blur(3px); }
        #wave-announce { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffdd00; font-size: 36px; font-weight: bold; text-shadow: 0 0 30px #ff7700; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #boss-warning { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #ff0055; font-size: 40px; font-weight: bold; text-shadow: 0 0 30px #ff0055; z-index: 50; opacity: 0; pointer-events: none; }
        @media (max-width: 600px) {
            .screen h1 { font-size: 24px; }
            .screen p { font-size: 12px; }
            .btn { font-size: 14px; padding: 10px 28px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 5px 10px; }
            .stat-item { padding: 5px 10px; }
            .stat-value { font-size: 15px; }
            .ui-section { font-size: 13px; padding: 4px 8px; }
            .hp-bar-container, .xp-bar-container { width: 60px; height: 8px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui" style="display:none;">
        <div class="ui-section">
            <span>🏆</span>
            <span id="score">0</span>
            <span style="font-size:12px;color:#8fa0af;">Lv.<span id="level">1</span></span>
            <div class="xp-bar-container"><div id="xp-bar"></div></div>
        </div>
        <div class="ui-section">
            <span>❤️</span>
            <div class="hp-bar-container"><div id="hp-bar"></div></div>
            <span id="hp-text">100</span>
        </div>
        <div class="ui-section" id="wave-section" style="display:none;">
            <span>🌊</span>
            <span>波</span>
            <span id="wave-num">1</span>
        </div>
        <div class="ui-section">
            <div class="powerups-list" id="powerups-display"></div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1>⭐ STAR STRIKE ⭐</h1>
        <p>異星敵機來襲！拖曳戰機展開反擊！</p>
        <div style="margin: 10px 0;">
            <div class="powerups-list">
                <span>❤️</span><span>⚡</span><span>🛡️</span><span>🔥</span>
            </div>
        </div>
        <p style="font-size:12px;">💡 打怪掉落道具 · 升級變強 · 每5波有Boss戰</p>
        <button id="startBtn" class="btn">🚀 啟動戰機</button>
        <div id="highscore-display" style="margin-top:15px;color:#ffdd00;font-size:14px;"></div>
    </div>

    <div id="game-over-screen" class="screen" style="display:none;">
        <h2 style="color:#ff0055;">💥 戰機墜毀</h2>
        <p>防線失守... 最終得分：</p>
        <p style="font-size:36px;color:#00f0ff;font-weight:bold;">🏆 <span id="final-score">0</span></p>
        <div class="stats-grid" id="final-stats"></div>
        <div id="new-highscore" style="display:none;" class="highscore-banner">🎉 創下最高分！</div>
        <button id="restartBtn" class="btn" style="background:linear-gradient(45deg,#ff0055,#ff7700);box-shadow:0 0 15px #ff0055;">🔄 重新出擊</button>
        <button id="menuBtn" class="btn secondary">🏠 選單</button>
    </div>

    <div id="pause-overlay">
        <div>⏸️ 暫停中</div>
        <button id="resumeBtn" class="btn" style="margin-top:20px;">▶️ 繼續遊戲</button>
    </div>

    <div id="wave-announce"></div>
    <div id="boss-warning">⚠️ BOSS 來襲 ⚠️</div>

    <script>
    // ===== 音效系統 (Web Audio API) =====
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTone(freq, duration, type, vol) {
        if (!audioCtx) return;
        try {
            type = type || 'sine'; vol = vol || 0.15;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }
    function sfxShoot() { playTone(800, 0.08, 'square', 0.08); playTone(1200, 0.05, 'sine', 0.05); }
    function sfxExplosion() { playTone(150, 0.3, 'sawtooth', 0.2); playTone(80, 0.4, 'square', 0.15); }
    function sfxHit() { playTone(300, 0.1, 'sawtooth', 0.15); }
    function sfxPowerup() { playTone(523, 0.1, 'sine', 0.12); setTimeout(function(){playTone(659, 0.1, 'sine', 0.12);}, 80); setTimeout(function(){playTone(784, 0.15, 'sine', 0.12);}, 160); }
    function sfxLevelUp() { [523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.15,'sine',0.15);},i*100);}); }
    function sfxBossWarning() { playTone(100, 0.5, 'sawtooth', 0.2); playTone(150, 0.5, 'square', 0.15); }
    function sfxVictory() { [523,659,784,1047,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.2,'sine',0.15);},i*120);}); }
    function sfxDamage() { playTone(200, 0.2, 'sawtooth', 0.2); playTone(100, 0.3, 'square', 0.15); }

    // ===== 遊戲變數 =====
    var canvas = document.getElementById('gameCanvas');
    var ctx = canvas.getContext('2d');
    var gameActive = false, paused = false, score = 0, combo = 0, comboTimer = 0;
    var wave = 0, waveEnemies = 0, waveEnemiesKilled = 0;
    var bossActive = false, boss = null;
    var lastSpawnTime = 0, lastShootTime = 0;
    var spawnInterval = 1000, shootInterval = 180;
    var player, bullets = [], enemies = [], particles = [], stars = [], powerups = [], floatingTexts = [];
    var highScore = parseInt(localStorage.getItem('starstrike_highscore') || '0');
    var playerPowerups = { tripleShot: 0, shield: 0, rapidFire: 0, homing: 0 };

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createStars() {
        stars = [];
        for (var i = 0; i < 80; i++) {
            stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2+0.5, speed: Math.random()*2+0.5, twinkle: Math.random()*Math.PI*2 });
        }
    }

    // 粒子系統
    var Particle = function(x, y, color, count) {
        count = count || 1;
        this.x = x; this.y = y; this.color = color; this.size = Math.random()*3+1;
        this.speedX = (Math.random()-0.5)*6*count; this.speedY = (Math.random()-0.5)*6*count;
        this.alpha = 1; this.decay = Math.random()*0.02+0.015;
    };
    Particle.prototype.update = function() { this.x+=this.speedX; this.y+=this.speedY; this.alpha-=this.decay; };
    Particle.prototype.draw = function() {
        ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
    };

    // 浮動文字
    var FloatingText = function(x, y, text, color) {
        color = color || '#fff';
        this.x=x; this.y=y; this.text=text; this.color=color; this.alpha=1; this.vy=-1.5; this.decay=0.02;
    };
    FloatingText.prototype.update = function() { this.y+=this.vy; this.alpha-=this.decay; };
    FloatingText.prototype.draw = function() {
        ctx.save(); ctx.globalAlpha=this.alpha; ctx.fillStyle=this.color; ctx.font='bold 16px Arial'; ctx.textAlign='center';
        ctx.fillText(this.text, this.x, this.y); ctx.restore();
    };

    // 道具物件
    var PowerupItem = function(x, y) {
        this.x = x; this.y = y; this.size = 20; this.speed = 1.5;
        var types = ['heal', 'tripleShot', 'shield', 'rapidFire', 'homing'];
        this.type = types[Math.floor(Math.random()*types.length)];
        this.emojis = {heal:'❤️', tripleShot:'⚡', shield:'🛡️', rapidFire:'🔥', homing:'🎯'};
        this.colors = {heal:'#ff4444', tripleShot:'#4488ff', shield:'#44ff88', rapidFire:'#ff8844', homing:'#ff44ff'};
        this.bobOffset = Math.random()*Math.PI*2;
    };
    PowerupItem.prototype.update = function() { this.y+=this.speed; this.bobOffset+=0.1; };
    PowerupItem.prototype.draw = function() {
        var bobY = this.y + Math.sin(this.bobOffset)*3;
        ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = this.colors[this.type];
        ctx.font = '22px Arial'; ctx.textAlign = 'center';
        ctx.fillText(this.emojis[this.type], this.x, bobY);
        ctx.strokeStyle = this.colors[this.type]; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(this.x, bobY, 14, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    };

    // 玩家戰機
    var Player = function() {
        this.size = 22;
        this.x = canvas.width/2; this.y = canvas.height*0.8;
        this.hp = 100; this.maxHp = 100;
        this.xp = 0; this.level = 1; this.xpNeeded = 100;
        this.targetX = this.x; this.targetY = this.y;
        this.invincible = 0;
    };
    Player.prototype.update = function() {
        var self = this;
        this.x += (this.targetX-this.x)*0.25;
        this.y += (this.targetY-this.y)*0.25;
        this.x = Math.max(this.size, Math.min(canvas.width-this.size, this.x));
        this.y = Math.max(this.size, Math.min(canvas.height-this.size, this.y));
        if (this.invincible > 0) this.invincible--;
        for (var key in playerPowerups) { if (playerPowerups[key] > 0) playerPowerups[key]--; }
    };
    Player.prototype.draw = function() {
        var self = this;
        if (this.invincible > 0 && this.invincible%4 < 2) return;
        ctx.save();
        if (playerPowerups.shield > 0) {
            ctx.strokeStyle = 'rgba(68,255,136,0.4)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size+10, 0, Math.PI*2); ctx.stroke();
        }
        ctx.shadowBlur = 15; ctx.shadowColor = '#00f0ff'; ctx.fillStyle = '#00f0ff';
        ctx.beginPath();
        ctx.moveTo(this.x, this.y-this.size*1.2);
        ctx.lineTo(this.x-this.size, this.y+this.size*0.5);
        ctx.lineTo(this.x, this.y+this.size*0.25);
        ctx.lineTo(this.x+this.size, this.y+this.size*0.5);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x, this.y-2, 5, 0, Math.PI*2); ctx.fill();
        var flameH = 8 + Math.random()*5;
        ctx.fillStyle = '#00f0ff'; ctx.globalAlpha = 0.6;
        ctx.beginPath(); ctx.moveTo(this.x-8, this.y+this.size*0.3); ctx.lineTo(this.x, this.y+this.size*0.3+flameH); ctx.lineTo(this.x+8, this.y+this.size*0.3); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
    };
    Player.prototype.takeDamage = function(dmg) {
        if (this.invincible > 0) return;
        if (playerPowerups.shield > 0) { playerPowerups.shield = 0; this.invincible = 60; sfxHit(); return; }
        this.hp -= dmg; this.invincible = 30;
        playerDamageTaken += dmg; sfxDamage(); updateHpBar();
        if (this.hp <= 0) { this.hp = 0; gameOver(); }
    };
    Player.prototype.gainXP = function(amount) {
        this.xp += amount;
        while (this.xp >= this.xpNeeded) {
            this.xp -= this.xpNeeded; this.level++;
            this.xpNeeded = Math.floor(this.xpNeeded * 1.5);
            this.maxHp += 10; this.hp = Math.min(this.hp + 30, this.maxHp);
            sfxLevelUp();
            floatingTexts.push(new FloatingText(this.x, this.y-40, '⬆️ LEVEL UP!', '#ffdd00'));
            updateHpBar();
        }
        updateXpBar();
    };
    Player.prototype.applyPowerup = function(type) {
        sfxPowerup();
        if (type === 'heal') { this.hp = Math.min(this.hp+30, this.maxHp); floatingTexts.push(new FloatingText(this.x, this.y-40, '+30 HP', '#44ff44')); updateHpBar(); }
        else {
            var durations = {tripleShot:600, shield:600, rapidFire:500, homing:400};
            var durSec = {tripleShot:10, shield:10, rapidFire:8, homing:7};
            playerPowerups[type] = durations[type];
            floatingTexts.push(new FloatingText(this.x, this.y-40, type.toUpperCase()+' x'+durSec[type]+'s', this._typeColor(type)));
        }
        updatePowerupsDisplay();
    };
    Player.prototype._typeColor = function(t) { return {tripleShot:'#4488ff', shield:'#44ff88', rapidFire:'#ff8844', homing:'#ff44ff'}[t]||'#fff'; };

    // 子彈
    function fireBullet(angle) {
        if (!player || !gameActive) return;
        angle = angle || 0;
        var bCount = playerPowerups.tripleShot > 0 ? 3 : 1;
        var baseAngle = -Math.PI/2;
        var spread = 0.15;
        for (var i = 0; i < bCount; i++) {
            var a = bCount === 1 ? baseAngle : baseAngle + (i-(bCount-1)/2)*spread + angle;
            var speed = 12;
            bullets.push({ x:player.x, y:player.y-player.size*0.5, vx:Math.cos(a)*speed, vy:Math.sin(a)*speed, radius:4, color:playerPowerups.rapidFire>0?'#ff8844':'#00ff66', homing:playerPowerups.homing>0, age:0 });
        }
        sfxShoot();
    }

    // 敵機
    var Enemy = function(isBoss) {
        isBoss = isBoss || false;
        this.isBoss = isBoss;
        this.size = isBoss ? 50 : (Math.random()*15+20);
        this.x = isBoss ? canvas.width/2 : (Math.random()*(canvas.width-this.size*2)+this.size);
        this.y = isBoss ? -100 : (-this.size);
        this.maxHp = isBoss ? (200 + wave*30) : (1 + Math.floor(wave*0.3));
        this.hp = this.maxHp;
        this.speed = isBoss ? 1 : (Math.random()*1.5+1.5 + wave*0.15);
        this.color = isBoss ? '#ff0055' : ['#ff0055','#ff7700','#ff00aa','#aa44ff'][Math.floor(Math.random()*4)];
        this.movePattern = Math.random() < 0.3 ? 'zigzag' : 'straight';
        this.zigTimer = 0;
        this.children = [];
        this.phase = 0; this.phaseTimer = 0;
    };
    Enemy.prototype.update = function() {
        if (this.isBoss) { this.updateBoss(); return; }
        this.y += this.speed;
        if (this.movePattern === 'zigzag') {
            this.zigTimer++;
            if (this.zigTimer % 60 < 30) this.x += 1.5; else this.x -= 1.5;
            this.x = Math.max(this.size, Math.min(canvas.width-this.size, this.x));
        }
    };
    Enemy.prototype.updateBoss = function() {
        this.phaseTimer++;
        if (this.y < 80) { this.y += 0.5; return; }
        if (this.phase === 0) {
            this.x += Math.sin(this.phaseTimer*0.02)*2;
            if (this.phaseTimer % 90 === 0) {
                var a;
                for (a = 0; a < 5; a++) {
                    var angle = (a/4)*Math.PI*0.6 - Math.PI*0.3;
                    this.children.push({x:this.x, y:this.y+this.size, vx:Math.cos(angle)*3, vy:Math.sin(angle)*3, size:6, age:0, color:'#ff0055'});
                }
            }
        }
        if (this.phaseTimer > 300) { this.phase = 1; this.phaseTimer = 0; }
        if (this.phase === 1) {
            if (this.phaseTimer % 60 === 0) {
                var i, angle;
                for (i = 0; i < 8; i++) {
                    angle = (i/8)*Math.PI*2;
                    this.children.push({x:this.x, y:this.y, vx:Math.cos(angle)*2, vy:Math.sin(angle)*2, size:5, age:0, color:'#ff7700'});
                }
            }
        }
    };
    Enemy.prototype.draw = function() {
        ctx.save();
        ctx.shadowBlur = this.isBoss ? 20 : 10; ctx.shadowColor = this.color; ctx.fillStyle = this.color;
        if (this.isBoss) {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
            ctx.fillText('BOSS', this.x, this.y+5);
            ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.fillRect(this.x-40, this.y-this.size-12, 80, 6);
            ctx.fillStyle = '#ff0055'; ctx.fillRect(this.x-40, this.y-this.size-12, 80*(this.hp/this.maxHp), 6);
        } else {
            ctx.beginPath(); ctx.moveTo(this.x, this.y+this.size); ctx.lineTo(this.x-this.size, this.y);
            ctx.lineTo(this.x, this.y-this.size*0.5); ctx.lineTo(this.x+this.size, this.y);
            ctx.closePath(); ctx.fill();
        }
        var j, c;
        for (j = this.children.length - 1; j >= 0; j--) {
            c = this.children[j];
            c.x += c.vx; c.y += c.vy; c.age++;
            if (c.age > 200) { this.children.splice(j, 1); continue; }
            ctx.save(); ctx.fillStyle = c.color; ctx.shadowBlur = 8; ctx.shadowColor = c.color;
            ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
        }
        ctx.restore();
    };

    // 遊戲控制
    function initGame() {
        initAudio();
        score = 0; combo = 0; comboTimer = 0; wave = 0; waveEnemies = 0; waveEnemiesKilled = 0;
        bossActive = false; boss = null; bullets = []; enemies = []; particles = []; powerups = []; floatingTexts = [];
        playerPowerups = {tripleShot:0, shield:0, rapidFire:0, homing:0};
        playerKills = 0; playerDamageTaken = 0;
        spawnInterval = 1000; shootInterval = 180;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'none';
        document.getElementById('ui').style.display = 'flex';
        player = new Player(); createStars();
        gameActive = true; paused = false;
        updateScore(); updateHpBar(); updateXpBar(); updatePowerupsDisplay();
        announceWave(1);
        lastSpawnTime = performance.now(); lastShootTime = performance.now();
        requestAnimationFrame(animate);
    }

    function announceWave(n) {
        wave = n; waveEnemies = 5 + n*3; waveEnemiesKilled = 0;
        document.getElementById('wave-announce').style.display = 'block';
        document.getElementById('wave-announce').textContent = n%5===0 ? ('⚠️ BOSS 波 ' + n + ' ⚠️') : ('🌊 第 ' + n + ' 波');
        document.getElementById('wave-announce').style.opacity = 1;
        document.getElementById('wave-section').style.display = 'flex';
        document.getElementById('wave-num').textContent = n;
        if (n%5===0) sfxBossWarning();
        setTimeout(function(){ document.getElementById('wave-announce').style.opacity = 0; }, 2000);
    }

    function updateScore() { document.getElementById('score').textContent = score; }
    function updateHpBar() {
        if (!player) return;
        var hpBar = document.getElementById('hp-bar');
        hpBar.style.width = (player.hp/player.maxHp*100)+'%';
        document.getElementById('hp-text').textContent = player.hp;
        if (player.hp/player.maxHp < 0.3) hpBar.style.background = 'linear-gradient(90deg,#ff0055,#ff4444)';
        else hpBar.style.background = 'linear-gradient(90deg,#00f0ff,#00ff66)';
    }
    function updateXpBar() {
        if (!player) return;
        document.getElementById('xp-bar').style.width = (player.xp/player.xpNeeded*100)+'%';
        document.getElementById('level').textContent = player.level;
    }
    function updatePowerupsDisplay() {
        var display = document.getElementById('powerups-display');
        var html = '';
        var key;
        for (key in playerPowerups) {
            if (playerPowerups[key] > 0) {
                var emojis = {tripleShot:'⚡', shield:'🛡️', rapidFire:'🔥', homing:'🎯'};
                html += '<span class="powerup-indicator" style="color:'+player._typeColor(key)+'">'+emojis[key]+Math.ceil(playerPowerups[key]/60)+'s</span>';
            }
        }
        display.innerHTML = html;
    }

    function gameOver() {
        gameActive = false;
        var isNew = score > highScore;
        if (isNew) { highScore = score; localStorage.setItem('starstrike_highscore', highScore); }
        document.getElementById('final-score').textContent = score;
        document.getElementById('new-highscore').style.display = isNew ? 'block' : 'none';
        document.getElementById('final-stats').innerHTML =
            '<div class="stat-item"><div class="stat-label">擊殺數</div><div class="stat-value">💀 '+playerKills+'</div></div>' +
            '<div class="stat-item"><div class="stat-label">最高波次</div><div class="stat-value">🌊 '+wave+'</div></div>' +
            '<div class="stat-item"><div class="stat-label">等級</div><div class="stat-value">⭐ Lv.'+player.level+'</div></div>' +
            '<div class="stat-item"><div class="stat-label">最高分</div><div class="stat-value">🏆 '+highScore+'</div></div>';
        document.getElementById('game-over-screen').style.display = 'flex';
        sfxExplosion();
    }

    function backToMenu() {
        document.getElementById('game-over-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
        document.getElementById('highscore-display').textContent = highScore > 0 ? '最高分: '+highScore : '';
        document.getElementById('ui').style.display = 'none';
    }

    function togglePause() {
        if (!gameActive) return;
        paused = !paused;
        document.getElementById('pause-overlay').style.display = paused ? 'flex' : 'none';
    }
    function resumeGame() { paused = false; document.getElementById('pause-overlay').style.display = 'none'; }

    // 遊戲主迴圈
    function animate(currentTime) {
        if (!gameActive || paused) return;
        requestAnimationFrame(animate);
        ctx.fillStyle = 'rgba(3,3,12,0.3)'; ctx.fillRect(0,0,canvas.width,canvas.height);

        // 星空
        var star, i;
        for (i = 0; i < stars.length; i++) {
            star = stars[i];
            star.y += star.speed;
            if (star.y > canvas.height) { star.y=0; star.x=Math.random()*canvas.width; }
            var twinkle = 0.4 + 0.6*Math.abs(Math.sin(star.twinkle+currentTime*0.001));
            ctx.fillStyle = 'rgba(255,255,255,'+(twinkle*0.6)+')';
            ctx.fillRect(star.x, star.y, star.size, star.size);
        }

        player.update(); player.draw();

        // 自動射擊
        var si = playerPowerups.rapidFire > 0 ? Math.floor(shootInterval*0.4) : shootInterval;
        if (currentTime - lastShootTime > si) { fireBullet(); lastShootTime = currentTime; }

        // 子彈
        for (i = bullets.length - 1; i >= 0; i--) {
            var bullet = bullets[i];
            bullet.x += bullet.vx; bullet.y += bullet.vy; bullet.age++;
            if (bullet.homing && enemies.length > 0) {
                var closest = null, minDist = 300, e2;
                for (e2 = 0; e2 < enemies.length; e2++) {
                    var d = Math.hypot(enemies[e2].x-bullet.x, enemies[e2].y-bullet.y);
                    if (d < minDist) { minDist = d; closest = enemies[e2]; }
                }
                if (closest) {
                    var angle = Math.atan2(closest.y-bullet.y, closest.x-bullet.x);
                    var ca = Math.atan2(bullet.vy, bullet.vx);
                    var diff = angle - ca;
                    var turnRate = 0.08;
                    var na = ca + (diff > 0 ? 1 : -1) * Math.min(Math.abs(diff), turnRate);
                    var spd = Math.hypot(bullet.vx, bullet.vy);
                    bullet.vx = Math.cos(na)*spd; bullet.vy = Math.sin(na)*spd;
                }
            }
            if (bullet.x < -20 || bullet.x > canvas.width+20 || bullet.y < -20 || bullet.y > canvas.height+20 || bullet.age > 300) { bullets.splice(i,1); continue; }
            ctx.save(); ctx.shadowBlur=12; ctx.shadowColor=bullet.color; ctx.fillStyle=bullet.color;
            ctx.beginPath(); ctx.arc(bullet.x,bullet.y,bullet.radius,0,Math.PI*2); ctx.fill(); ctx.restore();

            for (e2 = enemies.length - 1; e2 >= 0; e2--) {
                var enemy = enemies[e2];
                if (enemy.children) {
                    var ce;
                    for (ce = enemy.children.length - 1; ce >= 0; ce--) {
                        var c = enemy.children[ce];
                        if (Math.hypot(bullet.x-c.x, bullet.y-c.y) < c.size+bullet.radius) {
                            enemy.children.splice(ce,1); bullets.splice(i,1); sfxHit(); break;
                        }
                    }
                    if (i >= bullets.length) break;
                }
                if (i >= bullets.length) break;
                var dist = Math.hypot(bullet.x-enemy.x, bullet.y-enemy.y);
                if (dist < enemy.size+bullet.radius) {
                    var pi;
                    for (pi = 0; pi < 8; pi++) particles.push(new Particle(enemy.x, enemy.y, enemy.color));
                    enemy.hp--;
                    bullets.splice(i,1);
                    if (enemy.hp <= 0) {
                        if (enemy.isBoss) {
                            bossActive = false;
                            for (pi = 0; pi < 40; pi++) particles.push(new Particle(enemy.x, enemy.y, '#ffdd00', 3));
                            score += 200;
                            floatingTexts.push(new FloatingText(enemy.x, enemy.y, 'BOSS 擊破! +200', '#ffdd00'));
                            sfxVictory();
                            var p2;
                            for (p2 = 0; p2 < 3; p2++) powerups.push(new PowerupItem(enemy.x+Math.random()*40-20, enemy.y+Math.random()*40-20));
                            announceWave(wave+1);
                        } else {
                            score += 10*(1+Math.floor(combo/5)); combo++; comboTimer = 120;
                            playerKills++; player.gainXP(10+Math.floor(wave*0.5));
                            floatingTexts.push(new FloatingText(enemy.x, enemy.y, '+'+(10*(1+Math.floor(combo/5))), combo>5?'#ffdd00':'#fff'));
                            sfxExplosion();
                            if (Math.random() < 0.08) powerups.push(new PowerupItem(enemy.x, enemy.y));
                        }
                        enemies.splice(e2,1); waveEnemiesKilled++;
                        if (!bossActive && waveEnemiesKilled >= waveEnemies) {
                            if (wave > 0 && wave%5===0) {
                                bossActive = true; boss = new Enemy(true); enemies.push(boss);
                                document.getElementById('boss-warning').style.opacity=1;
                                setTimeout(function(){ document.getElementById('boss-warning').style.opacity=0; }, 2000);
                            } else { announceWave(wave+1); }
                        }
                    } else { sfxHit(); }
                    break;
                }
            }
        }

        if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }

        if (!bossActive && waveEnemiesKilled < waveEnemies) {
            if (currentTime - lastSpawnTime > spawnInterval) {
                enemies.push(new Enemy(false));
                lastSpawnTime = currentTime;
                spawnInterval = Math.max(400, 1000 - wave*30);
            }
        }

        for (e2 = enemies.length - 1; e2 >= 0; e2--) {
            enemy = enemies[e2];
            enemy.update(); enemy.draw();
            if (!enemy.isBoss && enemy.y > canvas.height+enemy.size) {
                enemies.splice(e2,1); waveEnemiesKilled++;
                player.takeDamage(10); playerDamageTaken+=10;
                floatingTexts.push(new FloatingText(canvas.width/2, canvas.height/2, '漏了！-10HP','#ff0055'));
            }
            if (!enemy.isBoss && player) {
                var distToPlayer = Math.hypot(enemy.x-player.x, enemy.y-player.y);
                if (distToPlayer < enemy.size+player.size) {
                    for (pi=0; pi<15; pi++) particles.push(new Particle(enemy.x,enemy.y,'#ff0000'));
                    enemies.splice(e2,1); waveEnemiesKilled++;
                    player.takeDamage(20); playerDamageTaken+=20;
                    floatingTexts.push(new FloatingText(player.x,player.y,'💥 撞擊 -20HP','#ff0055'));
                }
            }
        }

        for (i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].alpha <= 0) particles.splice(i,1); }

        for (i = powerups.length - 1; i >= 0; i--) {
            powerups[i].update(); powerups[i].draw();
            if (powerups[i].y > canvas.height+30) { powerups.splice(i,1); continue; }
            if (player && Math.hypot(powerups[i].x-player.x, powerups[i].y-player.y) < player.size+powerups[i].size) {
                player.applyPowerup(powerups[i].type);
                floatingTexts.push(new FloatingText(powerups[i].x,powerups[i].y,powerups[i].emojis[powerups[i].type],'#fff'));
                powerups.splice(i,1);
            }
        }

        for (i = floatingTexts.length - 1; i >= 0; i--) { floatingTexts[i].update(); floatingTexts[i].draw(); if (floatingTexts[i].alpha <= 0) floatingTexts.splice(i,1); }

        updateScore(); updatePowerupsDisplay();
    }

    // 輸入事件
    function handleMove(e) {
        if (!gameActive || !player) return;
        e.preventDefault();
        var clientX = e.touches ? e.touches[0].clientX : e.clientX;
        var clientY = e.touches ? e.touches[0].clientY : e.clientY;
        player.targetX = clientX;
        player.targetY = clientY - 30;
    }
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove, {passive:false});
    window.addEventListener('touchstart', function(e) { if(gameActive) handleMove(e); }, {passive:false});
    window.addEventListener('keydown', function(e) { if(e.code==='Space'||e.code==='KeyP') togglePause(); });
    window.addEventListener('contextmenu', function(e) { e.preventDefault(); if(gameActive) togglePause(); });

    // 按鈕綁定 (DOMContentLoaded)
    function setupButtons() {
        var startBtn = document.getElementById('startBtn');
        var restartBtn = document.getElementById('restartBtn');
        var menuBtn = document.getElementById('menuBtn');
        var resumeBtn = document.getElementById('resumeBtn');
        if (startBtn) startBtn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); initGame(); });
        if (restartBtn) restartBtn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); initGame(); });
        if (menuBtn) menuBtn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); backToMenu(); });
        if (resumeBtn) resumeBtn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); resumeGame(); });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setupButtons);
    } else {
        setupButtons();
    }

    // 開始畫面顯示最高分
    document.getElementById('highscore-display').textContent = highScore > 0 ? '最高分: ' + highScore : '';

    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); });
    </script>
</body>
</html>
